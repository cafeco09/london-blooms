<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>London Blooms</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <style>
    :root {
      --bg:        #faf7f3;
      --panel:     #ffffff;
      --panel-2:   #fdf9f5;
      --border:    #e8ddd3;
      --border-md: #d4c5b8;
      --ink:       #1f1a16;
      --muted:     #7a6e65;
      --muted-2:   #b0a49b;

      --rose:      #d4607a;
      --rose-lt:   #fbeef2;
      --rose-mid:  rgba(212,96,122,0.15);
      --rose-glow: rgba(212,96,122,0.25);

      --bud-col:   #5a9e6f;
      --bud-bg:    #eef7f1;
      --peak-col:  #c4365a;
      --peak-bg:   #fceef2;
      --fade-col:  #9a7040;
      --fade-bg:   #fdf5e8;

      --sky:  #4a90b8;
      --sage: #5a9e6f;

      --r: 14px;
      --r-sm: 10px;
      --r-pill: 999px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
    }

    .page {
      display: grid;
      grid-template-columns: 400px 1fr;
      height: 100vh;
    }

    /* ── SIDEBAR ─────────────────────── */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 22px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo-blob {
      width: 38px; height: 38px;
      background: var(--rose-lt);
      border: 1.5px solid #f0c4cf;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--ink);
    }
    .logo-title span { color: var(--rose); font-style: italic; }

    /* ── BLOOM STAGE BANNER ── */
    .bloom-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--r);
      border: 1.5px solid var(--border);
      background: var(--panel-2);
    }
    .bloom-banner.bud    { border-color: #b8dfc5; background: var(--bud-bg);  }
    .bloom-banner.peak   { border-color: #f0b8c6; background: var(--peak-bg); }
    .bloom-banner.fading { border-color: #e8ccaa; background: var(--fade-bg); }

    .bloom-emoji { font-size: 26px; line-height: 1; flex-shrink: 0; }
    .bloom-info  { flex: 1; min-width: 0; }

    .bloom-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted-2);
      margin-bottom: 1px;
    }

    .bloom-stage {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .bloom-stage.bud    { color: var(--bud-col);  }
    .bloom-stage.peak   { color: var(--peak-col); }
    .bloom-stage.fading { color: var(--fade-col); }
    .bloom-stage.none   { color: var(--muted);    }

    .bloom-temp { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

    .bloom-badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: var(--r-pill);
    }
    .bloom-badge.bud    { background: #d4f0de; color: var(--bud-col);  }
    .bloom-badge.peak   { background: #fad4df; color: var(--peak-col); }
    .bloom-badge.fading { background: #fce8cc; color: var(--fade-col); }
    .bloom-badge.none   { background: var(--border); color: var(--muted); }

    /* ── FILTERS ── */
    .filters {
      flex-shrink: 0;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .filter-heading {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ── FLOWER NAME GRID ── */
    .flower-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .flower-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border-radius: var(--r-pill);
      border: 1.5px solid var(--border);
      background: var(--panel-2);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .14s ease;
    }

    .flower-btn:hover {
      border-color: var(--rose);
      background: var(--rose-lt);
      color: var(--rose);
    }

    .flower-btn.active {
      background: var(--rose-lt);
      border-color: var(--rose);
      color: var(--rose);
      font-weight: 600;
    }

    /* ── TEXT SEARCH ── */
    .search-field { position: relative; }

    .search-field svg {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted-2);
      pointer-events: none;
    }

    .search-field input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font: inherit;
      font-size: 0.88rem;
      background: var(--panel-2);
      color: var(--ink);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .search-field input::placeholder { color: var(--muted-2); }
    .search-field input:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px var(--rose-mid);
    }

    /* ── MONTH CHIPS ── */
    .month-chips { display: flex; gap: 7px; flex-wrap: wrap; }

    .month-chip {
      padding: 6px 14px;
      border-radius: var(--r-pill);
      border: 1.5px solid var(--border);
      background: var(--panel-2);
      color: var(--muted);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .14s;
    }

    .month-chip:hover { border-color: var(--border-md); color: var(--ink); }

    .month-chip.active {
      background: var(--rose-lt);
      border-color: var(--rose);
      color: var(--rose);
      font-weight: 600;
    }

    /* ── STATS ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 9px 10px;
      text-align: center;
    }

    .stat .num {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--rose);
    }

    .stat .lab {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-bar {
      padding: 7px 20px;
      font-size: 0.78rem;
      color: var(--muted-2);
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    /* ── RESULTS ── */
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px 28px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .results::-webkit-scrollbar { width: 4px; }
    .results::-webkit-scrollbar-track { background: transparent; }
    .results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .tree-card {
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .14s, transform .12s, box-shadow .14s;
      position: relative;
      overflow: hidden;
    }

    .tree-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--rose);
      opacity: 0;
      transition: opacity .14s;
    }

    .tree-card:hover {
      border-color: var(--rose);
      transform: translateX(2px);
      box-shadow: var(--shadow);
    }

    .tree-card:hover::before,
    .tree-card.active::before { opacity: 1; }

    .tree-card.active {
      border-color: #f0b8c6;
      background: var(--rose-lt);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .tree-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
    }

    .month-badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }

    .mbadge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: var(--r-pill);
    }

    .mbadge.march  { background: #e0f0f8; color: var(--sky);  border: 1px solid #b8ddf0; }
    .mbadge.april  { background: var(--rose-lt); color: var(--rose); border: 1px solid #f0c4cf; }
    .mbadge.may    { background: #eef7ee; color: var(--sage); border: 1px solid #b8dcb8; }

    .card-meta {
      font-size: 0.79rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 3px 14px;
    }

    .card-meta strong { color: var(--ink); font-weight: 500; }

    .empty {
      background: var(--panel);
      border: 1.5px dashed var(--border);
      border-radius: var(--r);
      padding: 20px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.7;
    }

    /* ── MAP ── */
    .map-wrap { position: relative; }
    #map { width: 100%; height: 100vh; }

    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: var(--shadow-md);
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .popup-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 5px;
    }

    .popup-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: var(--r-pill);
    }
    .popup-chip.bud    { background: #d4f0de; color: var(--bud-col);  }
    .popup-chip.peak   { background: #fad4df; color: var(--peak-col); }
    .popup-chip.fading { background: #fce8cc; color: var(--fade-col); }

    .map-info {
      position: absolute;
      bottom: 18px; left: 18px;
      z-index: 1000;
      background: rgba(255,255,255,0.93);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 11px 15px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow-md);
    }
    .map-info strong { color: var(--ink); }

    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .page { grid-template-columns: 1fr; grid-template-rows: auto 52vh; height: auto; }
      .sidebar { max-height: 65vh; }
      #map { height: 52vh; }
    }
  </style>
</head>
<body>
<div class="page">

  <aside class="sidebar">

    <div class="sidebar-top">
      <div class="logo-row">
        <div class="logo-blob">🌸</div>
        <div class="logo-title">London <span>Blooms</span></div>
      </div>
      <div class="bloom-banner" id="bloomBanner">
        <div class="bloom-emoji" id="bloomEmoji">⏳</div>
        <div class="bloom-info">
          <div class="bloom-label">Right now · London</div>
          <div class="bloom-stage none" id="bloomStageName">Checking weather…</div>
          <div class="bloom-temp" id="bloomTemp">Fetching temperature</div>
        </div>
        <div class="bloom-badge none" id="bloomBadge">…</div>
      </div>
    </div>

    <div class="filters">

      <!-- FLOWER FILTER — most prominent -->
      <div>
        <div class="filter-heading">🌺 Filter by flower name</div>
        <div class="flower-grid" id="flowerGrid"></div>
      </div>

      <!-- Free-text fallback -->
      <div>
        <div class="filter-heading">Or search any name</div>
        <div class="search-field">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="nameInput" type="text" placeholder="e.g. Rowan, Hawthorn…" autocomplete="off" />
        </div>
      </div>

      <!-- Month -->
      <div>
        <div class="filter-heading">Bloom month</div>
        <div class="month-chips">
          <button class="month-chip active" data-month="all">All spring</button>
          <button class="month-chip" data-month="March">March</button>
          <button class="month-chip" data-month="April">April</button>
          <button class="month-chip" data-month="May">May</button>
        </div>
      </div>

      <!-- Borough -->
      <div>
        <div class="filter-heading">Borough</div>
        <div class="search-field">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          <input id="boroughInput" type="text" placeholder="e.g. Camden, Hackney…" autocomplete="off" />
        </div>
      </div>

    </div>

    <div class="stats-bar">
      <div class="stat"><div class="num" id="cTrees">0</div><div class="lab">trees</div></div>
      <div class="stat"><div class="num" id="cBoroughs">0</div><div class="lab">boroughs</div></div>
      <div class="stat"><div class="num" id="cTypes">0</div><div class="lab">varieties</div></div>
    </div>

    <div class="status-bar" id="statusBar">Loading…</div>
    <div class="results" id="results"></div>
  </aside>

  <main class="map-wrap">
    <div id="map"></div>
    <div class="map-info" id="mapInfo"><strong>London Blooms</strong> · Click a marker or card</div>
  </main>

</div>

<script>
const SUPABASE_URL      = "https://esfjzhgzfbcrrewjvoan.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZmp6aGd6ZmJjcnJld2p2b2FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjg3NjIsImV4cCI6MjA4OTk0NDc2Mn0.kJOMlq3vHwYWwogSIyLccveHecA5D7WX2RwLzMqe8bY";
const TABLE_NAME        = "spring_trees";
const MAX_RESULTS       = 1000;
const MAX_CARDS         = 120;
const LAT = 51.5074, LON = -0.1278;

const WEATHER_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_mean&current=temperature_2m&timezone=Europe%2FLondon&forecast_days=1&past_days=7`;

const FLOWERS = [
  { icon:"🌸", name:"Cherry"       },
  { icon:"🌸", name:"Cherry Plum"  },
  { icon:"🌺", name:"Magnolia"     },
  { icon:"🌼", name:"Crab Apple"   },
  { icon:"🌿", name:"Hawthorn"     },
  { icon:"🍐", name:"Pear"         },
  { icon:"🍎", name:"Apple"        },
  { icon:"🟣", name:"Plum"         },
  { icon:"🌸", name:"Almond"       },
  { icon:"🌼", name:"Blackthorn"   },
  { icon:"🌳", name:"Rowan"        },
];

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let map, markers;
let trees       = [];
let selectedId  = null;
let activeMonth = "all";
let activeName  = "";
let bloom       = { cls:"none", label:"Unknown", detail:"", emoji:"🌿" };
let debounce    = null;

const nameInput    = document.getElementById("nameInput");
const boroughInput = document.getElementById("boroughInput");
const resultsEl    = document.getElementById("results");
const statusEl     = document.getElementById("statusBar");
const cTreesEl     = document.getElementById("cTrees");
const cBorEl       = document.getElementById("cBoroughs");
const cTypEl       = document.getElementById("cTypes");
const bannerEl     = document.getElementById("bloomBanner");
const emojiEl      = document.getElementById("bloomEmoji");
const stageNameEl  = document.getElementById("bloomStageName");
const stageTempEl  = document.getElementById("bloomTemp");
const badgeEl      = document.getElementById("bloomBadge");
const mapInfoEl    = document.getElementById("mapInfo");
const flowerGridEl = document.getElementById("flowerGrid");

async function fetchWeather() {
  try {
    const r    = await fetch(WEATHER_URL);
    const d    = await r.json();
    const means = d.daily?.temperature_2m_mean ?? [];
    const avg  = means.length ? means.reduce((a,b)=>a+b,0)/means.length : null;
    const cur  = d.current?.temperature_2m ?? null;

    let cls, label, emoji;
    if      (avg === null) { cls="none";   label="Data unavailable"; emoji="🌿"; }
    else if (avg < 8)      { cls="bud";    label="Early Bud";         emoji="🌱"; }
    else if (avg < 12)     { cls="bud";    label="Bud Burst";         emoji="🌱"; }
    else if (avg < 17)     { cls="peak";   label="Peak Blossom";      emoji="🌸"; }
    else                   { cls="fading"; label="Fading";            emoji="🍃"; }

    const detail = avg !== null
      ? `7-day avg ${avg.toFixed(1)} °C${cur!==null?`  ·  Now ${cur.toFixed(0)} °C`:""}`
      : "Temperature unavailable";

    bloom = { cls, label, emoji, detail };
  } catch {
    bloom = { cls:"none", label:"Unavailable", emoji:"🌿", detail:"Weather API error" };
  }
  renderBanner();
}

function renderBanner() {
  const { cls, label, emoji, detail } = bloom;
  bannerEl.className      = `bloom-banner ${cls}`;
  emojiEl.textContent     = emoji;
  stageNameEl.textContent = label;
  stageNameEl.className   = `bloom-stage ${cls}`;
  stageTempEl.textContent = detail;
  badgeEl.textContent     = label;
  badgeEl.className       = `bloom-badge ${cls}`;

  const chip = cls !== "none"
    ? `<span style="display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;font-weight:700;padding:3px 9px;border-radius:999px;margin-left:6px;background:${cls==="bud"?"#d4f0de":cls==="peak"?"#fad4df":"#fce8cc"};color:${cls==="bud"?"#5a9e6f":cls==="peak"?"#c4365a":"#9a7040"}">${emoji} ${label}</span>`
    : "";
  mapInfoEl.innerHTML = `<strong>London Blooms</strong>${chip}<br><span style="color:#b0a49b;font-size:0.76rem">Click a marker or card to explore</span>`;
}

function buildFlowerGrid() {
  flowerGridEl.innerHTML = FLOWERS.map(f => `
    <button class="flower-btn ${activeName.toLowerCase()===f.name.toLowerCase()?"active":""}" data-name="${f.name}">
      ${f.icon} ${f.name}
    </button>
  `).join("");

  flowerGridEl.querySelectorAll(".flower-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const name = btn.dataset.name;
      if (activeName.toLowerCase() === name.toLowerCase()) {
        activeName = ""; nameInput.value = "";
      } else {
        activeName = name; nameInput.value = name;
      }
      buildFlowerGrid();
      scheduleFetch();
    });
  });
}

function esc(s) {
  return String(s??"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

function parseMonths(p) {
  if (!p) return [];
  if (p==="March-April") return ["March","April"];
  if (p==="April-May")   return ["April","May"];
  return [p];
}

function norm(row, i) {
  return {
    id:           row.id ?? `r${i}`,
    common_name:  row.common_name ?? "Unknown",
    borough:      row.borough ?? "",
    location:     row.location ?? "",
    lat:          isFinite(+row.lat) ? +row.lat : null,
    lon:          isFinite(+row.lon) ? +row.lon : null,
    bloom_period: row.bloom_period ?? "",
    months:       parseMonths(row.bloom_period),
  };
}

function updateStats(list) {
  cTreesEl.textContent = list.length.toLocaleString();
  cBorEl.textContent   = new Set(list.map(t=>t.borough).filter(Boolean)).size;
  cTypEl.textContent   = new Set(list.map(t=>t.common_name).filter(Boolean)).size;
}

function mbClass(m) { return m==="March"?"march":m==="April"?"april":"may"; }

function renderCards(list) {
  if (!list.length) {
    resultsEl.innerHTML = `<div class="empty">
      No trees matched your filters.<br><br>
      Try a different flower button, or switch month to <em>All spring</em>.
    </div>`;
    return;
  }

  resultsEl.innerHTML = list.slice(0, MAX_CARDS).map(t => {
    const isActive = String(t.id) === String(selectedId);
    const badges = t.months.map(m =>
      `<span class="mbadge ${mbClass(m)}">${m}</span>`).join("");
    return `<div class="tree-card ${isActive?"active":""}" data-id="${esc(t.id)}">
      <div class="card-top">
        <div class="tree-name">${esc(t.common_name)}</div>
        <div class="month-badges">${badges}</div>
      </div>
      <div class="card-meta">
        ${t.borough  ? `<span><strong>Borough</strong> ${esc(t.borough)}</span>` : ""}
        ${t.location ? `<span><strong>Place</strong> ${esc(t.location)}</span>` : ""}
        ${t.bloom_period ? `<span><strong>Blooms</strong> ${esc(t.bloom_period)}</span>` : ""}
      </div>
    </div>`;
  }).join("");

  resultsEl.querySelectorAll(".tree-card").forEach(card => {
    card.addEventListener("click", () => {
      const t = list.find(x => String(x.id)===String(card.dataset.id));
      if (!t || !isFinite(t.lat) || !isFinite(t.lon)) return;
      selectedId = t.id;
      renderCards(trees);
      map.flyTo([t.lat, t.lon], 17, { duration: 0.8 });
      const lyr = Object.values(markers._layers??{})
        .find(l => l?.options?.tid && String(l.options.tid)===String(t.id));
      if (lyr) setTimeout(()=>lyr.openPopup(), 320);
    });
  });
}

const MCOLS = {
  bud:    { s:"#4a9060", f:"#8eca9e" },
  peak:   { s:"#a8304e", f:"#d4607a" },
  fading: { s:"#8a6030", f:"#c4a060" },
  none:   { s:"#8a7060", f:"#b4a090" },
};

function renderMarkers(list) {
  markers.clearLayers();
  const valid = list.filter(t => isFinite(t.lat) && isFinite(t.lon));
  if (!valid.length) return;

  const col = MCOLS[bloom.cls] ?? MCOLS.none;
  const bounds = [];

  valid.forEach(t => {
    const chipHtml = bloom.cls !== "none"
      ? `<div style="display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:0.72rem;font-weight:700;padding:3px 9px;border-radius:999px;background:${bloom.cls==="bud"?"#d4f0de":bloom.cls==="peak"?"#fad4df":"#fce8cc"};color:${bloom.cls==="bud"?"#5a9e6f":bloom.cls==="peak"?"#c4365a":"#9a7040"}">${bloom.emoji} ${bloom.label}</div>`
      : "";

    const popup = `
      <div class="popup-name">${esc(t.common_name)}</div>
      ${t.borough  ? `<div><strong>Borough</strong> ${esc(t.borough)}</div>` : ""}
      ${t.location ? `<div><strong>Place</strong> ${esc(t.location)}</div>` : ""}
      ${t.bloom_period ? `<div><strong>Bloom</strong> ${esc(t.bloom_period)}</div>` : ""}
      ${chipHtml}
    `;

    const m = L.circleMarker([t.lat, t.lon], {
      radius:6, weight:1.5,
      color:col.s, fillColor:col.f, fillOpacity:0.9,
      tid: t.id,
    }).bindPopup(popup);

    m.on("click", () => { selectedId = t.id; renderCards(trees); });
    markers.addLayer(m);
    bounds.push([t.lat, t.lon]);
  });

  if (bounds.length) map.fitBounds(bounds, { padding:[28,28] });
  setTimeout(()=>map.invalidateSize(), 100);
}

async function fetchTrees() {
  statusEl.textContent = "Loading…";

  const nameQ    = (nameInput.value.trim()).replace(/,/g," ");
  const boroughQ = (boroughInput.value.trim()).replace(/,/g," ");

  let q = db.from(TABLE_NAME)
    .select("id, borough, lat, lon, common_name, location, bloom_period")
    .not("lat","is",null).not("lon","is",null)
    .limit(MAX_RESULTS);

  if (activeMonth !== "all") {
    const map_ = {
      March: ["March","March-April"],
      April: ["March-April","April","April-May"],
      May:   ["April-May","May"],
    };
    q = q.in("bloom_period", map_[activeMonth]);
  }

  if (nameQ)    q = q.ilike("common_name", `%${nameQ}%`);
  if (boroughQ) q = q.ilike("borough",     `%${boroughQ}%`);

  q = q.order("common_name", { ascending:true });

  const { data, error } = await q;

  if (error) {
    trees = [];
    updateStats([]); renderCards([]); renderMarkers([]);
    statusEl.textContent = `Error: ${error.message}`;
    return;
  }

  trees = (data||[]).map(norm);
  statusEl.textContent = trees.length >= MAX_RESULTS
    ? `Showing first ${MAX_RESULTS.toLocaleString()} — narrow filters for more`
    : `${trees.length.toLocaleString()} trees found`;

  updateStats(trees);
  renderCards(trees);
  renderMarkers(trees);
}

function scheduleFetch() {
  clearTimeout(debounce);
  debounce = setTimeout(fetchTrees, 260);
}

function initMap() {
  map = L.map("map", { zoomControl:true, preferCanvas:true }).setView([LAT,LON],10);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19, attribution:"&copy; OpenStreetMap contributors"
  }).addTo(map);
  markers = L.layerGroup().addTo(map);
  setTimeout(()=>map.invalidateSize(),250);
}

window.addEventListener("load", async () => {
  initMap();
  buildFlowerGrid();

  document.querySelectorAll(".month-chip").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".month-chip").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      activeMonth = btn.dataset.month;
      fetchTrees();
    });
  });

  nameInput.addEventListener("input", () => {
    activeName = nameInput.value.trim();
    buildFlowerGrid();
    scheduleFetch();
  });

  boroughInput.addEventListener("input", scheduleFetch);

  await fetchWeather();
  await fetchTrees();
});
</script>
