<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>London Blooms 🌸</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blush:      #f2c4ce;
      --rose:       #c95c76;
      --deep-rose:  #8f3550;
      --petal:      #fff5f7;
      --bark:       #3a2a2e;
      --soil:       #5a4048;
      --mist:       #fdf0f3;
      --sage:       #6a9e72;
      --cream:      #ffffff;
      --border:     #f0dde3;
      --shadow:     rgba(180,100,120,0.08);
      --shadow-md:  rgba(180,100,120,0.14);

      --sidebar-w:  340px;
      --header-h:   56px;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      color: var(--bark);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header {
      height: var(--header-h);
      background: var(--petal);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      position: relative;
      z-index: 500;
    }

    #header-title {
      font-family: var(--font-display);
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--rose);
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #header-title span.petal-icon { font-size: 1.2rem; }

    #main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--cream);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #bloom-banner {
      background: linear-gradient(135deg, var(--petal) 0%, #fce8ef 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    #bloom-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(201,92,118,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    #bloom-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #bloomEmoji { font-size: 1.6rem; line-height: 1; }

    #bloom-text { flex: 1; }

    #bloomStageName {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--rose);
      font-style: italic;
      line-height: 1.2;
    }

    #bloomTemp {
      font-size: 0.72rem;
      color: var(--soil);
      opacity: 0.7;
      margin-top: 2px;
    }

    #stats-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat-cell {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: none; }

    .stat-num {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--rose);
      line-height: 1;
    }

    .stat-lbl {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #9e8880;
      margin-top: 2px;
    }

    #filters {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--petal);
    }

    .filter-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #b09890;
      margin-bottom: 7px;
    }

    #month-chips,
    #regionChips,
    #flowerGrid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 12px;
    }

    .month-chip,
    .region-chip,
    .flower-btn {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--soil);
      cursor: pointer;
      transition: all 0.15s ease;
      line-height: 1.4;
    }

    .month-chip.active {
      background: var(--rose);
      border-color: var(--rose);
      color: #fff;
    }

    .region-chip.active {
      background: var(--sage);
      border-color: var(--sage);
      color: #fff;
    }

    .flower-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 400;
      padding: 4px 10px;
    }

    .flower-btn.active {
      background: var(--petal);
      border-color: var(--rose);
      color: var(--deep-rose);
      font-weight: 600;
    }

    .filter-inputs {
      display: flex;
      gap: 8px;
    }

    .filter-input-wrap {
      flex: 1;
      position: relative;
    }

    .filter-input-wrap input {
      width: 100%;
      font-family: var(--font-body);
      font-size: 0.8rem;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--bark);
      outline: none;
      transition: border-color 0.15s;
    }

    #clearFiltersBtn {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: #9e8880;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #statusBar {
      padding: 7px 16px;
      font-size: 0.72rem;
      color: #9e8880;
      border-bottom: 1px solid var(--border);
      background: var(--cream);
      flex-shrink: 0;
    }

    #results {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px;
      scroll-behaviour: smooth;
    }

    .empty {
      padding: 32px 16px;
      text-align: center;
      color: #b09890;
      font-size: 0.82rem;
      line-height: 1.7;
    }

    .tree-card {
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 7px;
      cursor: pointer;
      font-family: var(--font-body);
      color: var(--bark);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      display: block;
    }

    .tree-card.active {
      border-color: var(--rose);
      background: var(--petal);
      box-shadow: 0 4px 16px rgba(212,96,122,0.15);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }

    .tree-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--bark);
      line-height: 1.2;
    }

    .month-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .mbadge {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 10px;
    }

    .mbadge.march { background: #e8f4e8; color: #3a7a4a; }
    .mbadge.april { background: #fde8f0; color: #b03060; }
    .mbadge.may   { background: #fff3e0; color: #b06000; }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      font-size: 0.74rem;
      color: #8a7a74;
      margin-bottom: 7px;
    }

    .card-meta strong { color: var(--soil); font-weight: 600; margin-right: 3px; }

    .card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .view-btn {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--rose);
      text-transform: uppercase;
    }

    .card-link {
      font-size: 0.7rem;
      color: #9e8880;
      text-decoration: none;
      font-weight: 500;
    }

    #map-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(42,31,26,0.18) !important;
      border: 1px solid var(--border) !important;
    }
    .leaflet-popup-tip { background: #fff !important; }

    #mapInfo {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 400;
      background: rgba(254,250,247,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: var(--soil);
      line-height: 1.5;
      box-shadow: 0 4px 16px var(--shadow);
      pointer-events: none;
    }

    #mapInfo strong {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--bark);
      display: block;
    }

    #bottomSheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 600;
      background: var(--cream);
      border-top: 1.5px solid var(--border);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -8px 40px rgba(42,31,26,0.14);
      max-height: 62vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    }

    #bottomSheet.open { transform: translateY(0); }

    #sheet-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sheetTitle {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--bark);
    }

    #sheetSub {
      font-size: 0.74rem;
      color: #9e8880;
      margin-top: 2px;
    }

    #closeSheetBtn {
      background: none;
      border: none;
      cursor: pointer;
      color: #9e8880;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
    }

    #sheetList {
      overflow-y: auto;
      padding: 10px 14px 20px;
      flex: 1;
    }

    .sheet-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 8px;
    }

    .sheet-name {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--bark);
      margin-bottom: 2px;
    }

    .sheet-meta {
      font-size: 0.74rem;
      color: #9e8880;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .vote-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .vote-btn {
      font-family: var(--font-body);
      font-size: 0.76rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--soil);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .vote-btn.active.up   { background: #e8f4e8; border-color: #7abf88; color: #3a7a4a; }
    .vote-btn.active.down { background: #fde8f0; border-color: var(--rose); color: var(--deep-rose); }

    .score-pill {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--rose);
      background: var(--petal);
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid var(--blush);
    }

    .view-map-btn {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--soil);
      cursor: pointer;
    }

    .sheet-link {
      font-size: 0.72rem;
      color: #9e8880;
      text-decoration: none;
      font-weight: 500;
      margin-left: auto;
    }

    @media (max-width: 700px) {
      :root { --sidebar-w: 100vw; }
      #main { flex-direction: column; }
      #sidebar {
        width: 100%;
        height: 50vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      #map-wrap { height: 50vh; }
      #bottomSheet { max-height: 80vh; }
    }
  </style>
</head>
<body>

<div id="app">
  <header id="header">
    <div id="header-title">
      <span class="petal-icon">🌸</span>
      London Blooms
    </div>
    <span id="bloomBadge">Loading…</span>
  </header>

  <div id="main">
    <aside id="sidebar">
      <div id="bloom-banner">
        <div id="bloom-top">
          <div id="bloomEmoji">🌿</div>
          <div id="bloom-text">
            <div id="bloomStageName">Loading…</div>
            <div id="bloomTemp">Fetching weather…</div>
          </div>
        </div>
      </div>

      <div id="stats-bar">
        <div class="stat-cell">
          <div class="stat-num" id="cTrees">—</div>
          <div class="stat-lbl">Trees</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num" id="cBoroughs">—</div>
          <div class="stat-lbl">Boroughs</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num" id="cTypes">—</div>
          <div class="stat-lbl">Species</div>
        </div>
      </div>

      <div id="filters">
        <div class="filter-label">Month</div>
        <div id="month-chips">
          <button class="month-chip active" data-month="all" type="button">All</button>
          <button class="month-chip" data-month="March" type="button">March</button>
          <button class="month-chip" data-month="April" type="button">April</button>
          <button class="month-chip" data-month="May" type="button">May</button>
        </div>

        <div class="filter-label">Area</div>
        <div id="regionChips"></div>

        <div class="filter-label">Flower</div>
        <div id="flowerGrid"></div>

        <div class="filter-inputs">
          <div class="filter-input-wrap">
            <input id="nameInput" type="text" placeholder="Search by name…" autocomplete="off" />
          </div>
          <div class="filter-input-wrap">
            <input id="boroughInput" type="text" placeholder="Borough…" list="boroughList" autocomplete="off" />
            <datalist id="boroughList"></datalist>
          </div>
          <button id="clearFiltersBtn" type="button">Reset</button>
        </div>
      </div>

      <div id="statusBar">Loading…</div>
      <div id="results"></div>
    </aside>

    <div id="map-wrap">
      <div id="map"></div>

      <div id="mapInfo">
        <strong>London Blooms</strong>
        <span>Choose an area or click a marker</span>
      </div>

      <div id="bottomSheet">
        <div id="sheet-header">
          <div>
            <div id="sheetTitle">Region</div>
            <div id="sheetSub"></div>
          </div>
          <button id="closeSheetBtn" type="button" aria-label="Close">✕</button>
        </div>
        <div id="sheetList"></div>
      </div>
    </div>
  </div>
</div>

<script>

  function esc(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
  }

  function getVoterKey() {
    let k = localStorage.getItem("lb_voter_key");
    if (!k) {
      k = crypto.randomUUID();
      localStorage.setItem("lb_voter_key", k);
    }
    return k;
  }

  function mapsUrl(lat, lon) {
    return `https://www.google.com/maps?q=${encodeURIComponent(lat)},${encodeURIComponent(lon)}`;
  }

  function parseMonths(p) {
    if (!p) return [];
    if (p === "March-April") return ["March","April"];
    if (p === "April-May") return ["April","May"];
    return [p];
  }

  function regionFromBorough(borough) {
    const b = String(borough || "").trim().toLowerCase();
    const MAP = {
      Central: ["camden","city of london","city","islington","kensington and chelsea","westminster","lambeth","southwark"],
      North:   ["barnet","enfield","haringey","harrow","brent"],
      South:   ["bromley","croydon","greenwich","kingston upon thames","merton","richmond upon thames","sutton","wandsworth","lewisham","bexley"],
      East:    ["barking and dagenham","hackney","havering","newham","redbridge","tower hamlets","waltham forest"],
      West:    ["ealing","hammersmith and fulham","hillingdon","hounslow"]
    };
    for (const [r, bs] of Object.entries(MAP)) {
      if (bs.includes(b)) return r;
    }
    return "Other";
  }

  function normaliseRow(row, i) {
    return {
      id: Number.isFinite(+row.id) ? +row.id : i,
      common_name: row.common_name ?? "Unknown",
      borough: row.borough ?? "",
      region: regionFromBorough(row.borough),
      location: row.location ?? "",
      lat: Number.isFinite(+row.lat) ? +row.lat : null,
      lon: Number.isFinite(+row.lon) ? +row.lon : null,
      bloom_period: row.bloom_period ?? "",
      months: parseMonths(row.bloom_period)
    };
  }

  function speciesKey(name) {
    const n = String(name || "").trim().toLowerCase();
    return Object.keys(SPECIES_COLORS).find(k => k !== "default" && n.includes(k)) || "default";
  }

  function markerStyle(tree, isSelected = false) {
    const c = SPECIES_COLORS[speciesKey(tree.common_name)] || SPECIES_COLORS.default;
    return {
      radius: isSelected ? 10 : 7,
      weight: isSelected ? 3 : 1.8,
      color: isSelected ? "#ffffff" : c.stroke,
      fillColor: c.fill,
      fillOpacity: isSelected ? 1 : 0.92
    };
  }

  function getVoteTotals(id) {
    return state.votesBySpot.get(String(id)) || { upvotes:0, downvotes:0, score:0 };
  }

  function getMyVote(id) {
    return state.myVotesBySpot.get(String(id)) || 0;
  }

  function mbClass(m) {
    return m === "March" ? "march" : m === "April" ? "april" : "may";
  }

  function buildFlowerGrid() {
    flowerGridEl.innerHTML = FLOWERS.map(f => `
      <button class="flower-btn ${state.filters.name.toLowerCase() === f.name.toLowerCase() ? "active" : ""}" data-name="${esc(f.name)}" type="button">
        ${f.icon} ${esc(f.name)}
      </button>
    `).join("");

    flowerGridEl.querySelectorAll(".flower-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const n = btn.dataset.name;
        const toggled = state.filters.name.toLowerCase() === n.toLowerCase();
        state.filters.name = toggled ? "" : n;
        nameInput.value = toggled ? "" : n;
        buildFlowerGrid();
        scheduleApplyFilters();
      });
    });
  }

  function buildRegionChips() {
    regionChipsEl.innerHTML = REGIONS.map(r => `
      <button class="region-chip ${state.activeRegion === r ? "active" : ""}" data-region="${r}" type="button">${r}</button>
    `).join("");

    regionChipsEl.querySelectorAll(".region-chip").forEach(btn => {
      btn.addEventListener("click", () => {
        const r = btn.dataset.region;
        state.activeRegion = state.activeRegion === r ? "" : r;
        buildRegionChips();
        applyFilters();
        if (state.activeRegion) openSheetForRegion(state.activeRegion);
        else closeSheet();
      });
    });
  }

  function populateBoroughList() {
    const bs = [...new Set(state.allTrees.map(t => (t.borough || "").trim()).filter(Boolean))]
      .sort((a,b) => a.localeCompare(b));
    boroughListEl.innerHTML = bs.map(b => `<option value="${esc(b)}"></option>`).join("");
  }

  async function fetchWeather() {
    try {
      const r = await fetch(WEATHER_URL);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      const means = d.daily?.temperature_2m_mean ?? [];
      const avg = means.length ? means.reduce((a,b) => a + b, 0) / means.length : null;
      const cur = d.current?.temperature_2m ?? null;

      let label = "Seasonal Signal";
      let emoji = "🌿";

      if (avg !== null) {
        if (avg < 8) {
          label = "Early Bud";
          emoji = "🌱";
        } else if (avg < 12) {
          label = "Bud Burst";
          emoji = "🌱";
        } else if (avg < 17) {
          label = "Peak Blossom";
          emoji = "🌸";
        } else {
          label = "Fading";
          emoji = "🍃";
        }
      }

      bloomEmojiEl.textContent = emoji;
      bloomStageNameEl.textContent = label;
      bloomTempEl.textContent = avg !== null
        ? `7-day avg ${avg.toFixed(1)} °C${cur !== null ? ` · Now ${cur.toFixed(0)} °C` : ""}`
        : "Temperature unavailable";
      bloomBadgeEl.textContent = label;
    } catch (e) {
      bloomStageNameEl.textContent = "Unavailable";
      bloomTempEl.textContent = "Weather unavailable";
      bloomBadgeEl.textContent = "?";
    }
  }

  async function fetchTrees() {
    statusEl.textContent = "Loading trees…";

    const pageSize = 1000;
    let from = 0;
    let allRows = [];

    while (true) {
      const { data, error } = await db
        .from(TABLE_NAME)
        .select("id, borough, lat, lon, common_name, location, bloom_period")
        .not("lat", "is", null)
        .not("lon", "is", null)
        .order("id", { ascending: true })
        .range(from, from + pageSize - 1);

      if (error) {
        statusEl.textContent = `Couldn't load trees: ${error.message || "unknown error"}`;
        console.error("fetchTrees error:", error);
        return;
      }

      const rows = data || [];
      allRows = allRows.concat(rows);

      if (rows.length < pageSize) break;
      from += pageSize;
    }

    state.allTrees = allRows.map(normaliseRow);

    console.log("Loaded rows:", state.allTrees.length);
    console.log("Species found:", [...new Set(state.allTrees.map(t => t.common_name))].sort());

    populateBoroughList();
    applyFilters();
  }

  async function fetchVoteTotals() {
    const { data, error } = await db.from("spot_vote_totals").select("*");
    if (error) {
      console.warn("fetchVoteTotals:", error);
      return;
    }
    state.votesBySpot = new Map(
      (data || []).map(r => [
        String(r.spot_id),
        {
          upvotes: Number(r.upvotes || 0),
          downvotes: Number(r.downvotes || 0),
          score: Number(r.score || 0)
        }
      ])
    );
  }

  async function fetchMyVotes() {
    const { data, error } = await db
      .from("spot_votes")
      .select("spot_id,vote")
      .eq("voter_key", getVoterKey());

    if (error) {
      console.warn("fetchMyVotes:", error);
      return;
    }

    state.myVotesBySpot = new Map(
      (data || []).map(r => [String(r.spot_id), Number(r.vote)])
    );
  }

  async function castVote(spotId, vote) {
    const prev = getVoteTotals(spotId);
    const prevMine = getMyVote(spotId);
    const newMine = vote === prevMine ? 0 : vote;
    const delta = newMine - prevMine;

    state.myVotesBySpot.set(String(spotId), newMine);
    state.votesBySpot.set(String(spotId), {
      upvotes: Math.max(0, prev.upvotes + (newMine === 1 ? 1 : 0) - (prevMine === 1 ? 1 : 0)),
      downvotes: Math.max(0, prev.downvotes + (newMine === -1 ? 1 : 0) - (prevMine === -1 ? 1 : 0)),
      score: prev.score + delta
    });

    if (state.activeRegion) openSheetForRegion(state.activeRegion);

    const { error } = await db.rpc("cast_vote", {
      p_spot_id: Number(spotId),
      p_voter_key: getVoterKey(),
      p_vote: vote
    });

    if (error) {
      state.myVotesBySpot.set(String(spotId), prevMine);
      state.votesBySpot.set(String(spotId), prev);
      if (state.activeRegion) openSheetForRegion(state.activeRegion);
      alert(`Couldn't save vote: ${error.message || "unknown error"}`);
      return;
    }

    await fetchVoteTotals();
    await fetchMyVotes();
    if (state.activeRegion) openSheetForRegion(state.activeRegion);
  }

  function applyFilters() {
    state.visibleTrees = state.allTrees.filter(t =>
      (state.filters.month === "all" || t.months.includes(state.filters.month)) &&
      (!state.filters.name || t.common_name.toLowerCase().includes(state.filters.name.toLowerCase())) &&
      (!state.filters.borough || t.borough.toLowerCase().includes(state.filters.borough.toLowerCase())) &&
      (!state.activeRegion || t.region.toLowerCase() === state.activeRegion.toLowerCase())
    );

    const ids = new Set(state.visibleTrees.map(t => String(t.id)));
    if (state.selectedId && !ids.has(String(state.selectedId))) state.selectedId = null;

    render();
  }

  function scheduleApplyFilters() {
    clearTimeout(state.filterDebounce);
    state.filterDebounce = setTimeout(applyFilters, 220);
  }

  function renderStats() {
    cTreesEl.textContent = state.visibleTrees.length.toLocaleString();
    cBorEl.textContent = new Set(state.visibleTrees.map(t => t.borough).filter(Boolean)).size;
    cTypEl.textContent = new Set(state.visibleTrees.map(t => t.common_name).filter(Boolean)).size;
  }

  function renderStatus() {
    if (!state.allTrees.length) {
      statusEl.textContent = "No tree data loaded yet.";
      return;
    }
    if (!state.visibleTrees.length) {
      statusEl.textContent = "No trees matched your filters.";
      return;
    }
    statusEl.textContent = state.visibleTrees.length > MAX_CARDS
      ? `${state.visibleTrees.length.toLocaleString()} trees · showing first ${MAX_CARDS}`
      : `${state.visibleTrees.length.toLocaleString()} trees found`;
  }

  function renderCards() {
    const visibleKey = state.visibleTrees.map(t => t.id).join(",");
    const sameSet = visibleKey === state._lastVisibleIds;
    const sameSel = state.selectedId === state._lastSelectedId;
    if (sameSet && sameSel) return;

    const prevSel = state._lastSelectedId;
    state._lastVisibleIds = visibleKey;
    state._lastSelectedId = state.selectedId;

    if (sameSet && !sameSel) {
      if (prevSel !== null) document.querySelector(`.tree-card[data-id="${prevSel}"]`)?.classList.remove("active");
      if (state.selectedId !== null) {
        const el = document.querySelector(`.tree-card[data-id="${state.selectedId}"]`);
        if (el) {
          el.classList.add("active");
          el.scrollIntoView({ behaviour:"smooth", block:"nearest" });
        }
      }
      return;
    }

    const list = state.visibleTrees;
    if (!list.length) {
      resultsEl.innerHTML = `<div class="empty">No trees matched your filters.<br><br>Try a different flower, reset filters, or choose another area.</div>`;
      return;
    }

    const frag = document.createDocumentFragment();

    list.slice(0, MAX_CARDS).forEach(t => {
      const isActive = String(t.id) === String(state.selectedId);
      const badges = t.months.map(m => `<span class="mbadge ${mbClass(m)}">${esc(m)}</span>`).join("");

      const btn = document.createElement("button");
      btn.className = `tree-card${isActive ? " active" : ""}`;
      btn.type = "button";
      btn.dataset.id = t.id;

      btn.innerHTML = `
        <div class="card-top">
          <div class="tree-name">${esc(t.common_name)}</div>
          <div class="month-badges">${badges}</div>
        </div>
        <div class="card-meta">
          ${t.region ? `<span><strong>Area</strong> ${esc(t.region)}</span>` : ""}
          ${t.borough ? `<span><strong>Borough</strong> ${esc(t.borough)}</span>` : ""}
          ${t.location ? `<span><strong>Place</strong> ${esc(t.location)}</span>` : ""}
        </div>
        <div class="card-actions">
          <span class="view-btn">View on map</span>
          ${Number.isFinite(t.lat) && Number.isFinite(t.lon) ? `<a class="card-link" href="${mapsUrl(t.lat,t.lon)}" target="_blank" rel="noopener noreferrer">Open in Maps ↗</a>` : ""}
        </div>
      `;

      btn.addEventListener("click", () => selectTree(t.id, true));
      frag.appendChild(btn);
    });

    resultsEl.replaceChildren(frag);

    if (state.selectedId !== null) {
      requestAnimationFrame(() => {
        document.querySelector(`.tree-card[data-id="${state.selectedId}"]`)?.scrollIntoView({
          behaviour: "smooth",
          block: "nearest"
        });
      });
    }
  }

  function popupHtml(t) {
    const v = getVoteTotals(t.id);
    return `<div style="font-family:'DM Sans',sans-serif;font-size:0.84rem;color:#7a6e65;line-height:1.6;min-width:185px;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:#2a1f1a;margin-bottom:5px;">${esc(t.common_name)}</div>
      ${t.region ? `<div><strong>Area</strong> ${esc(t.region)}</div>` : ""}
      ${t.borough ? `<div><strong>Borough</strong> ${esc(t.borough)}</div>` : ""}
      ${t.location ? `<div><strong>Place</strong> ${esc(t.location)}</div>` : ""}
      ${t.bloom_period ? `<div><strong>Bloom</strong> ${esc(t.bloom_period)}</div>` : ""}
      <div style="margin-top:8px;font-size:0.78rem;color:#d4607a;font-weight:700;">Score ${v.score >= 0 ? "+" : ""}${v.score}</div>
      <a href="${mapsUrl(t.lat,t.lon)}" target="_blank" rel="noopener noreferrer" style="margin-top:10px;color:#d4607a;font-weight:700;text-decoration:none;display:inline-block;">Open in Maps ↗</a>
    </div>`;
  }

  function renderMarkers() {
    const valid = state.visibleTrees.filter(t => Number.isFinite(t.lat) && Number.isFinite(t.lon));
    const newIds = new Set(valid.map(t => String(t.id)));

    for (const id of state.markersById.keys()) {
      if (!newIds.has(id)) {
        markerGroup.removeLayer(state.markersById.get(id));
        state.markersById.delete(id);
      }
    }

    const bounds = [];

    valid.forEach(t => {
      const id = String(t.id);
      const isSel = id === String(state.selectedId);

      if (state.markersById.has(id)) {
        state.markersById.get(id).setStyle(markerStyle(t, isSel));
      } else {
        const m = L.circleMarker([t.lat, t.lon], markerStyle(t, isSel)).bindPopup(popupHtml(t));
        m.on("click", () => selectTree(t.id, false));
        markerGroup.addLayer(m);
        state.markersById.set(id, m);
      }

      bounds.push([t.lat, t.lon]);
    });

    if (bounds.length && !state.hasInitialFit) {
      map.fitBounds(bounds, { padding:[28,28] });
      state.hasInitialFit = true;
    }
  }

  function renderMapInfo() {
    mapInfoEl.innerHTML = state.activeRegion
      ? `<strong>${esc(state.activeRegion)} London</strong><span>Showing places in this area</span>`
      : `<strong>London Blooms</strong><span>Choose an area or click a marker</span>`;
  }

  function render() {
    renderStats();
    renderStatus();
    renderCards();
    renderMarkers();
    renderMapInfo();
  }

  function selectTree(id, flyTo = true) {
    const tree = state.allTrees.find(t => String(t.id) === String(id));
    if (!tree) return;

    const inVisible = state.visibleTrees.some(t => String(t.id) === String(id));
    if (!inVisible) {
      state.activeRegion = "";
      state.filters.name = "";
      state.filters.borough = "";
      nameInput.value = "";
      boroughInput.value = "";
      buildFlowerGrid();
      buildRegionChips();
      applyFilters();
    }

    const prevId = state.selectedId;
    state.selectedId = tree.id;

    if (prevId !== null && state.markersById.has(String(prevId))) {
      const pt = state.allTrees.find(t => String(t.id) === String(prevId));
      if (pt) state.markersById.get(String(prevId)).setStyle(markerStyle(pt, false));
    }

    const marker = state.markersById.get(String(tree.id));
    if (marker) marker.setStyle(markerStyle(tree, true));

    renderCards();

    if (flyTo && Number.isFinite(tree.lat) && Number.isFinite(tree.lon)) {
      map.flyTo([tree.lat, tree.lon], Math.max(map.getZoom(), 16), { duration: 0.7 });
      map.once("moveend", () => marker?.openPopup());
    } else {
      marker?.openPopup();
    }
  }

  function rankedRegionTrees(region) {
    return state.allTrees
      .filter(t => t.region.toLowerCase() === region.toLowerCase())
      .map(t => ({ ...t, ...getVoteTotals(t.id), myVote: getMyVote(t.id) }))
      .sort((a,b) => (b.score - a.score) || (b.upvotes - a.upvotes) || a.common_name.localeCompare(b.common_name));
  }

  function openSheetForRegion(region) {
    const spots = rankedRegionTrees(region);
    sheetTitleEl.textContent = `${region} London`;
    sheetSubEl.textContent = `${spots.length} spot${spots.length === 1 ? "" : "s"} · sorted by community love`;

    if (!spots.length) {
      sheetListEl.innerHTML = `<div class="empty">No places found in this area yet.</div>`;
      sheetEl.classList.add("open");
      return;
    }

    const frag = document.createDocumentFragment();

    spots.forEach(t => {
      const card = document.createElement("div");
      card.className = "sheet-card";
      card.innerHTML = `
        <div class="sheet-card-top">
          <div class="sheet-name">${esc(t.common_name)}</div>
          <div class="sheet-meta">
            ${t.location ? `${esc(t.location)}<br>` : ""}
            ${t.borough ? `${esc(t.borough)} · ` : ""}${esc(t.bloom_period || "Spring")}
          </div>
        </div>
        <div class="vote-row">
          <button class="vote-btn up ${t.myVote === 1 ? "active up" : ""}" data-spot="${esc(t.id)}" data-vote="1" type="button">👍 <span>${t.upvotes}</span></button>
          <button class="vote-btn down ${t.myVote === -1 ? "active down" : ""}" data-spot="${esc(t.id)}" data-vote="-1" type="button">👎 <span>${t.downvotes}</span></button>
          <span class="score-pill">${t.score >= 0 ? "+" : ""}${t.score}</span>
          ${Number.isFinite(t.lat) && Number.isFinite(t.lon) ? `
            <button class="view-map-btn" data-id="${esc(t.id)}" type="button">🗺 Map</button>
            <a class="sheet-link" href="${mapsUrl(t.lat,t.lon)}" target="_blank" rel="noopener noreferrer">Open in Maps ↗</a>
          ` : ""}
        </div>
      `;
      frag.appendChild(card);
    });

    sheetListEl.replaceChildren(frag);

    sheetListEl.querySelectorAll(".vote-btn").forEach(btn => {
      btn.addEventListener("click", () => castVote(btn.dataset.spot, Number(btn.dataset.vote)));
    });

    sheetListEl.querySelectorAll(".view-map-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        closeSheet();
        selectTree(btn.dataset.id, true);
      });
    });

    sheetEl.classList.add("open");
  }

  function closeSheet() {
    sheetEl.classList.remove("open");
  }

  function resetFilters() {
    state.filters = { month:"all", name:"", borough:"" };
    state.selectedId = null;
    state.activeRegion = "";
    nameInput.value = "";
    boroughInput.value = "";

    document.querySelectorAll(".month-chip").forEach(b => b.classList.remove("active"));
    document.querySelector('.month-chip[data-month="all"]')?.classList.add("active");

    buildFlowerGrid();
    buildRegionChips();
    closeSheet();
    applyFilters();
    map.fitBounds(LONDON_BOUNDS, { padding:[24,24] });
  }

  function initMap() {
    LONDON_BOUNDS = L.latLngBounds([51.28, -0.52], [51.70, 0.33]);

    map = L.map("map", {
      zoomControl: true,
      preferCanvas: true,
      maxBounds: LONDON_BOUNDS,
      maxBoundsViscosity: 1.0,
      minZoom: 10,
      maxZoom: 18
    });

    map.fitBounds(LONDON_BOUNDS);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    markerGroup = L.layerGroup().addTo(map);

    map.on("click", e => {
      if (!e.originalEvent.target.closest(".leaflet-interactive")) {
        if (state.selectedId !== null) {
          const prev = state.allTrees.find(t => String(t.id) === String(state.selectedId));
          if (prev) state.markersById.get(String(prev.id))?.setStyle(markerStyle(prev, false));
          state.selectedId = null;
          renderCards();
        }
      }
    });
  }

  window.addEventListener("load", async () => {
    initMap();
    buildFlowerGrid();
    buildRegionChips();

    document.querySelectorAll(".month-chip").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".month-chip").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        state.filters.month = btn.dataset.month;
        applyFilters();
      });
    });

    nameInput.addEventListener("input", () => {
      state.filters.name = nameInput.value.trim();
      buildFlowerGrid();
      scheduleApplyFilters();
    });

    boroughInput.addEventListener("input", () => {
      state.filters.borough = boroughInput.value.trim();
      scheduleApplyFilters();
    });

    document.getElementById("clearFiltersBtn").addEventListener("click", resetFilters);
    document.getElementById("closeSheetBtn").addEventListener("click", closeSheet);
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeSheet();
    });

    await fetchWeather();
    await fetchTrees();
    await fetchVoteTotals();
    await fetchMyVotes();
    render();
  });
</script>
</body>
</html>
