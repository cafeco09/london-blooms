<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>London Blooms 🌸</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #fffaf7;
      --surface:   #ffffff;
      --border:    #ede8e3;
      --text:      #1a1310;
      --muted:     #7a6e68;
      --accent:    #c95a7f;
      --radius:    12px;
      --shadow:    0 2px 12px rgba(0,0,0,.07);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .site-header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .site-header a.support-link {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      border: 1.5px solid var(--accent);
      border-radius: 99px;
      padding: 5px 14px;
      transition: background .15s;
    }

    .site-header a.support-link:hover {
      background: var(--accent);
      color: #fff;
    }

    .stats-bar {
      display: flex;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .stat-item {
      flex: 1;
      min-width: 80px;
      text-align: center;
      padding: 12px 8px;
      border-right: 1px solid var(--border);
    }

    .stat-item:last-child { border-right: none; }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }

    .search-wrap input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 14px;
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .chip {
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 7px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      background: var(--surface);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .chip:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .chip.disabled, .chip:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .chip[data-type="reset"] {
      background: none;
      color: var(--muted);
      border-color: var(--border);
    }

    .results-line {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    #mapSection {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    #leafletMap {
      height: 560px;
      width: 100%;
      border-bottom: 1px solid var(--border);
    }

    .spot-drawer {
      padding: 16px;
      min-height: 110px;
    }

    .drawer-spot-name {
      font-size: 16px;
      font-weight: 700;
    }

    .drawer-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .drawer-empty {
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    .badge {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      background: #f0ebe6;
      color: var(--text);
    }

    .badge-cherry   { background: #fce8ef; color: #c95a7f; }
    .badge-magnolia { background: #fdf5e0; color: #8a6020; }
    .badge-wisteria { background: #ede8f8; color: #5a4a90; }
    .badge-bluebell { background: #e6eef8; color: #3a5a90; }
    .badge-stage    { background: #e8f5e9; color: #2e7d32; }
    .badge-neutral  { background: #f0ebe6; color: var(--muted); }

    .vote-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .vote-summary {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .vote-btns { display: flex; gap: 6px; }

    .vote-btn {
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      background: var(--surface);
      cursor: pointer;
      transition: all .15s;
    }

    .vote-btn:hover { border-color: var(--accent); }
    .vote-btn.active-up { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }
    .vote-btn.active-down { background: #fdecea; border-color: #c62828; color: #c62828; }
    .vote-btn:disabled { opacity: .5; cursor: not-allowed; }

    .section-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      margin-top: 28px;
    }

    .picks-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 24px;
    }

    .pick-card {
      flex: 0 0 180px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }

    .pick-card:hover, .pick-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,90,127,.12);
    }

    .pick-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 4px;
    }

    .pick-rank {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .pick-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }

    .pick-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .type-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      background: var(--surface);
      text-align: center;
    }

    .type-card .eyebrow {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .type-card .emoji {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .type-card h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .type-card p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .spot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .spot-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .spot-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .spot-eyebrow {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .spot-name {
      font-size: 15px;
      font-weight: 700;
      margin-top: 2px;
    }

    .spot-tree-tag {
      font-size: 11px;
      font-weight: 700;
      background: #f0ebe6;
      color: var(--muted);
      border-radius: 99px;
      padding: 3px 9px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .spot-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .spot-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    .spot-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .inline-tag {
      font-size: 11px;
      font-weight: 600;
      background: #f0ebe6;
      color: var(--muted);
      border-radius: 99px;
      padding: 3px 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-weight: 600;
      border-radius: 99px;
      cursor: pointer;
      text-decoration: none;
      transition: all .15s;
      border: 1.5px solid transparent;
    }

    .btn-secondary {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 7px 16px;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-sm {
      font-size: 12px;
      padding: 5px 12px;
    }

    #loadMoreBtn {
      display: block;
      width: 100%;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text);
      margin-bottom: 32px;
      transition: border-color .15s;
    }

    #loadMoreBtn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 16px 0;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1310;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 99px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .site-footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 24px 16px;
      border-top: 1px solid var(--border);
    }

    .site-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .leaflet-popup-content {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.45;
      margin: 10px 12px;
    }

    .bloom-pin {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }

    .bloom-pin.cherry   { background: #c95a7f; }
    .bloom-pin.magnolia { background: #b08030; }
    .bloom-pin.wisteria { background: #7060aa; }
    .bloom-pin.bluebell { background: #4a72a8; }

    @media (max-width: 600px) {
      .stat-num { font-size: 18px; }
      .spot-grid { grid-template-columns: 1fr; }
      .type-grid { grid-template-columns: 1fr 1fr; }
      #leafletMap { height: 460px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1>London Blooms 🌸</h1>
    <a class="support-link" href="https://buymeacoffee.com/anshdt" target="_blank" rel="noopener">☕ Support</a>
  </header>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num" id="statSpots">—</div>
      <div class="stat-label">Spots</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statPeak">—</div>
      <div class="stat-label">At peak</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statTypes">—</div>
      <div class="stat-label">Types</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statVotes">—</div>
      <div class="stat-label">Votes</div>
    </div>
  </div>

  <main class="container">

    <div class="filter-row" id="filterRow">
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Search spots, areas…" autocomplete="off" />
      </div>
      <button class="chip active" data-type="all">All</button>
      <button class="chip" data-type="cherry">🌸 Cherry</button>
      <button class="chip" data-type="magnolia">🤍 Magnolia</button>
      <button class="chip" data-type="wisteria">💜 Wisteria</button>
      <button class="chip" data-type="bluebell">💙 Bluebell</button>
      <button class="chip" id="resetBtn" data-type="reset">✕ Reset</button>
    </div>

    <p class="results-line" id="resultsLine">Loading…</p>

    <section id="mapSection">
      <div id="leafletMap"></div>
      <div class="spot-drawer" id="spotDrawer">
        <div class="drawer-empty">Loading spots…</div>
      </div>
    </section>

    <h2 class="section-title">✨ Best picks</h2>
    <div class="picks-row" id="bestPicks"></div>

    <h2 class="section-title">🌿 By type</h2>
    <div class="type-grid" id="typeGuide"></div>

    <h2 class="section-title" id="allSection">🗂 All spots</h2>
    <div class="spot-grid" id="spotGrid"></div>
    <button id="loadMoreBtn" hidden>Load more spots</button>

  </main>

  <div id="toast"></div>

  <footer class="site-footer">
    Built with 🌸 · <a href="https://buymeacoffee.com/anshdt" target="_blank" rel="noopener">Support this project</a>
  </footer>

  <script>
const SUPPORT_URL       = 'https://buymeacoffee.com/anshdt';
const SUPABASE_URL      = 'https://esfjzhgzfbcrrewjvoan.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_nEqvvmFcsCpgVO1SK8ho3g_3K9LMOgi';
const PAGE_SIZE         = 12;
const VALID_TYPES       = ['cherry', 'magnolia', 'wisteria', 'bluebell'];

const TYPE_ORDER       = VALID_TYPES;
const TYPE_LABEL       = { cherry:'Cherry blossom', magnolia:'Magnolia', wisteria:'Wisteria', bluebell:'Bluebell' };
const TYPE_LABEL_SHORT = { cherry:'Cherry', magnolia:'Magnolia', wisteria:'Wisteria', bluebell:'Bluebell' };
const TYPE_EMOJI       = { cherry:'🌸', magnolia:'🤍', wisteria:'💜', bluebell:'💙' };
const TYPE_COLOR       = { cherry:'#c95a7f', magnolia:'#b08030', wisteria:'#7060aa', bluebell:'#4a72a8' };
const STAGE_LABEL      = { early:'Early', peak:'Peak', fading:'Fading' };

if (!window.supabase || typeof window.supabase.createClient !== 'function') {
  throw new Error('Supabase SDK failed to load');
}
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let BLOOMS = [];
let availableTypes = new Set();
let activeType = 'all';
let searchText = '';
let selectedSpotId = null;
let visibleLimit = PAGE_SIZE;
let voteSummary = new Map();
let userVotes = new Map();
let liveChannel = null;
let leafletMap = null;
let leafletMarkersLayer = null;
let markerBySpotId = new Map();
let _searchDebounce = null;
let _sortedCache = null;
let _toastTimer = null;
let _cachedVoterKey = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

async function copyLocationText(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast('Location copied');
  } catch (err) {
    console.error(err);
    showToast('Could not copy location');
  }
}

function voterKey() {
  if (_cachedVoterKey) return _cachedVoterKey;
  let k = localStorage.getItem('lb_voter_key');
  if (!k) {
    k = 'v_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('lb_voter_key', k);
  }
  return (_cachedVoterKey = k);
}

function getVotes(id) {
  return voteSummary.get(String(id)) || { up:0, down:0, total:0, userVote:0 };
}

function confidence(meta) {
  if (!meta.total) return { label:'No signal yet' };
  const r = meta.up / meta.total;
  if (meta.total >= 6 && r >= 0.72) return { label:'✅ Community agrees' };
  if (meta.total >= 4 && r <= 0.35) return { label:'⚠️ Not yet, says community' };
  return { label:'Mixed signal' };
}

function esc(v) {
  return String(v ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function invalidateCache() {
  _sortedCache = null;
}

function filteredBlooms() {
  const q = searchText.trim().toLowerCase();
  return BLOOMS.filter(s => {
    if (activeType !== 'all' && s.type !== activeType) return false;
    if (!q) return true;
    return [s.name, s.area, s.borough, s.type, s.desc, s.location_type, s.maintainer]
      .filter(Boolean)
      .join(' ')
      .toLowerCase()
      .includes(q);
  });
}

function sortedVisible() {
  if (_sortedCache) return _sortedCache;
  _sortedCache = filteredBlooms()
    .slice()
    .sort((a, b) => (b.tree_count || 0) - (a.tree_count || 0) || a.name.localeCompare(b.name));
  return _sortedCache;
}

function topByType(type) {
  return filteredBlooms().find(s => s.type === type) || null;
}

// ─── FIX: broader coordinate field detection + borough vs area distinction ───
function normaliseBlooms(raw) {
  // Log the first raw record so we can see actual field names in the console
  if (raw && raw.length > 0) {
    console.log('[LondonBlooms] sample raw record keys:', Object.keys(raw[0]));
    console.log('[LondonBlooms] sample raw record:', raw[0]);
  }

  return (raw || []).map((s, i) => {
    // Try every plausible coordinate field name from Supabase
    const lat = Number(
      s.lat ?? s.latitude ?? s.lat_wgs84 ?? s.y ?? s.geo_lat ?? null
    );
    const lng = Number(
      s.lng ?? s.lon ?? s.longitude ?? s.long ?? s.lng_wgs84 ?? s.x ?? s.geo_lon ?? s.geo_lng ?? null
    );

    // Build a display area: prefer a specific neighbourhood/park over a generic borough name.
    // Common Supabase column names tried in order of specificity:
    const specificArea =
      s.neighbourhood  ??
      s.neighborhood   ??
      s.park           ??
      s.park_name      ??
      s.location_name  ??
      s.locality       ??
      s.district       ??
      null;

    const boroughArea =
      s.borough        ??
      s.area           ??   // ← 'area' is kept but de-prioritised
      s.council        ??
      s.local_authority??
      '';

    // Use the more specific label if it exists AND differs from the borough label,
    // otherwise fall back to borough. This prevents every spot showing "LB Barnet".
    const displayArea = (specificArea && specificArea !== boroughArea)
      ? specificArea
      : boroughArea;

    return {
      id: s.id ?? `spot_${i}`,
      name: s.name ?? 'Unnamed spot',
      area: String(displayArea ?? ''),
      borough: String(boroughArea ?? ''),   // kept separately for search
      type: String(s.type ?? '').toLowerCase(),
      stage: String(s.stage ?? 'early').toLowerCase(),
      desc: s.description ?? s.desc ?? '',
      tree_count: Number(s.tree_count ?? s.trees ?? 0),
      maintainer: s.maintainer ?? s.managed_by ?? '',
      location_type: s.location_type ?? s.site_type ?? '',
      lat: Number.isFinite(lat) ? lat : null,
      lng: Number.isFinite(lng) ? lng : null
    };
  }).filter(s =>
    s.name &&
    VALID_TYPES.includes(s.type) &&
    Number.isFinite(s.lat) &&
    Number.isFinite(s.lng)
  );
}
// ─────────────────────────────────────────────────────────────────────────────

function updateStats() {
  const v = sortedVisible();
  const peak = v.filter(s => s.stage === 'peak').length;
  const types = new Set(v.map(s => s.type));
  const totalVotes = [...voteSummary.values()].reduce((n, e) => n + e.total, 0);

  document.getElementById('statSpots').textContent = v.length;
  document.getElementById('statPeak').textContent = peak;
  document.getElementById('statTypes').textContent = types.size;
  document.getElementById('statVotes').textContent = totalVotes;
  document.getElementById('resultsLine').textContent = v.length
    ? `${v.length} spot${v.length === 1 ? '' : 's'} · ${peak} at peak bloom`
    : 'No spots match that filter.';
}

function renderChips() {
  document.querySelectorAll('.chip[data-type]').forEach(chip => {
    const type = chip.dataset.type;
    if (type === 'reset') return;
    const live = type === 'all' || availableTypes.has(type);
    chip.classList.toggle('disabled', !live);
    chip.classList.toggle('active', type === activeType);
    chip.disabled = !live;
  });
}

function makeGoogleMapsUrl(spot) {
  return `https://www.google.com/maps?q=${encodeURIComponent(String(spot.lat) + ',' + String(spot.lng))}`;
}

function makeMarkerIcon(spot) {
  return L.divIcon({
    className: '',
    html: `<div class="bloom-pin ${esc(spot.type)}">${TYPE_EMOJI[spot.type] || '•'}</div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
    popupAnchor: [0, -12]
  });
}

function popupHtml(spot) {
  const v = getVotes(spot.id);
  const copyText = `${spot.name} — ${spot.lat}, ${spot.lng}`;
  const mapsUrl = makeGoogleMapsUrl(spot);

  // Show borough in parentheses if area differs from it
  const areaLabel = (spot.borough && spot.area !== spot.borough)
    ? `${esc(spot.area)} (${esc(spot.borough)})`
    : esc(spot.area);

  return `
    <div style="min-width:220px">
      <div style="font-weight:700;font-size:14px;margin-bottom:4px">${esc(spot.name)}</div>
      <div style="font-size:12px;color:#7a6e68;margin-bottom:8px">
        ${areaLabel}${spot.location_type ? ' · ' + esc(spot.location_type) : ''}${spot.maintainer ? ' · ' + esc(spot.maintainer) : ''}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <span class="badge badge-${esc(spot.type)}">${TYPE_EMOJI[spot.type]} ${esc(TYPE_LABEL_SHORT[spot.type])}</span>
        <span class="badge badge-stage">${esc(STAGE_LABEL[spot.stage] || 'Unknown')}</span>
      </div>
      ${spot.desc ? `<div style="font-size:12px;color:#7a6e68;margin-bottom:8px">${esc(spot.desc)}</div>` : ''}
      <div style="font-size:12px;color:#7a6e68;margin-bottom:8px">📍 ${spot.lat}, ${spot.lng}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <a class="btn btn-secondary btn-sm" href="${mapsUrl}" target="_blank" rel="noopener">🧭 Open map</a>
        <button class="btn btn-secondary btn-sm" type="button" onclick="copyLocationText(${JSON.stringify(copyText)})">📋 Copy</button>
      </div>
      <div style="font-size:12px;color:#7a6e68">👍 ${v.up} · 👎 ${v.down}</div>
    </div>
  `;
}

function renderMap() {
  const visible = sortedVisible().filter(s => Number.isFinite(s.lat) && Number.isFinite(s.lng));

  if (!leafletMap) {
    leafletMap = L.map('leafletMap', {
      zoomControl: true
    }).setView([51.5074, -0.1278], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(leafletMap);

    leafletMarkersLayer = L.layerGroup().addTo(leafletMap);
  }

  leafletMarkersLayer.clearLayers();
  markerBySpotId = new Map();

  if (!visible.length) return;

  const bounds = [];

  visible.forEach(spot => {
    const marker = L.marker([spot.lat, spot.lng], {
      icon: makeMarkerIcon(spot)
    });

    marker.bindPopup(popupHtml(spot));

    marker.on('click', () => {
      selectedSpotId = spot.id;
      renderDrawer();
      renderBestPicks();
    });

    marker.addTo(leafletMarkersLayer);
    markerBySpotId.set(String(spot.id), marker);
    bounds.push([spot.lat, spot.lng]);
  });

  if (bounds.length === 1) {
    leafletMap.setView(bounds[0], 14);
  } else {
    leafletMap.fitBounds(bounds, { padding: [30, 30] });
  }
}

function spotDrawerHtml(spot) {
  const meta = getVotes(spot.id);
  const conf = confidence(meta);
  const googleMapsUrl = makeGoogleMapsUrl(spot);
  const copyText = `${spot.name} — ${spot.lat}, ${spot.lng}`;

  const areaLabel = (spot.borough && spot.area !== spot.borough)
    ? `${esc(spot.area)} (${esc(spot.borough)})`
    : esc(spot.area);

  return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <div>
        <div class="drawer-spot-name">${esc(spot.name)}</div>
        <div class="drawer-meta">${areaLabel}${spot.location_type ? ' · ' + esc(spot.location_type) : ''}${spot.maintainer ? ' · ' + esc(spot.maintainer) : ''}</div>
      </div>

      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <a class="btn btn-secondary btn-sm" href="${googleMapsUrl}" target="_blank" rel="noopener">🧭 Open map</a>
        <button class="btn btn-secondary btn-sm" type="button" onclick="copyLocationText(${JSON.stringify(copyText)})">📋 Copy</button>
      </div>
    </div>

    <div class="badges">
      <span class="badge badge-${esc(spot.type)}">${TYPE_EMOJI[spot.type]} ${esc(TYPE_LABEL_SHORT[spot.type])}</span>
      <span class="badge badge-stage">${esc(STAGE_LABEL[spot.stage] || 'Unknown')} bloom</span>
      <span class="badge badge-neutral">${spot.tree_count || 0} trees</span>
      <span class="badge badge-neutral">${esc(conf.label)}</span>
    </div>

    <div style="font-size:12px;color:var(--muted);margin:8px 0 2px">
      📍 ${spot.lat}, ${spot.lng}
    </div>

    ${spot.desc ? `<div style="font-size:13px;color:var(--muted);line-height:1.55;margin:8px 0">${esc(spot.desc)}</div>` : ''}

    <div class="vote-bar">
      <span class="vote-summary">👍 ${meta.up} · 👎 ${meta.down} · ${meta.total} vote${meta.total === 1 ? '' : 's'}</span>
      <div class="vote-btns">
        <button class="vote-btn${meta.userVote === 1 ? ' active-up' : ''}" data-vote="1" data-spot-id="${esc(spot.id)}">👍 Looks right</button>
        <button class="vote-btn${meta.userVote === -1 ? ' active-down' : ''}" data-vote="-1" data-spot-id="${esc(spot.id)}">👎 Not yet</button>
      </div>
    </div>`;
}

function renderDrawer() {
  const drawer = document.getElementById('spotDrawer');
  const visible = sortedVisible();
  const spot = visible.find(s => String(s.id) === String(selectedSpotId)) || visible[0];

  if (!spot) {
    drawer.innerHTML = '<div class="drawer-empty">No spots match current filters.</div>';
    return;
  }

  selectedSpotId = spot.id;
  drawer.innerHTML = spotDrawerHtml(spot);
  bindVoteButtons(drawer);
}

function renderBestPicks() {
  const host = document.getElementById('bestPicks');
  const visible = sortedVisible().slice(0, 6);

  if (!visible.length) {
    host.innerHTML = '<div class="empty">No spots match the current filters.</div>';
    return;
  }

  host.innerHTML = visible.map((spot, i) => `
    <div class="pick-card${String(selectedSpotId) === String(spot.id) ? ' active' : ''}" data-show-spot="${spot.id}" role="button" tabindex="0">
      <div class="pick-top">
        <div class="pick-rank">#${i+1} · ${TYPE_EMOJI[spot.type]} ${TYPE_LABEL_SHORT[spot.type]}</div>
        ${spot.stage === 'peak' ? '<span class="badge badge-stage" style="font-size:11px">Peak 🌸</span>' : ''}
      </div>
      <div class="pick-name">${esc(spot.name)}</div>
      <div class="pick-sub">${esc(spot.area)} · ${spot.tree_count || 0} trees</div>
    </div>`).join('');

  host.querySelectorAll('[data-show-spot]').forEach(el =>
    el.addEventListener('click', () => selectSpot(el.dataset.showSpot, true))
  );
}

function renderTypeGuide() {
  const host = document.getElementById('typeGuide');
  const cards = TYPE_ORDER.filter(t => availableTypes.has(t)).map(type => {
    const top = topByType(type);
    if (!top) return '';

    return `
      <div class="type-card">
        <div class="eyebrow">${TYPE_EMOJI[type]} ${TYPE_LABEL_SHORT[type]}</div>
        <div class="emoji">${TYPE_EMOJI[type]}</div>
        <h3>${esc(top.name)}</h3>
        <p>${esc(top.area)} · ${top.tree_count || 0} trees · ${esc(STAGE_LABEL[top.stage] || 'Unknown')} bloom</p>
        <button class="btn btn-secondary btn-sm" type="button" data-show-spot="${top.id}" style="margin-top:4px">Show on map</button>
      </div>`;
  }).join('');

  host.innerHTML = cards || '<div class="empty">No live bloom types in the current feed.</div>';
  host.querySelectorAll('[data-show-spot]').forEach(btn =>
    btn.addEventListener('click', () => selectSpot(btn.dataset.showSpot, true))
  );
}

function renderSpotGrid() {
  const host = document.getElementById('spotGrid');
  const moreBtn = document.getElementById('loadMoreBtn');
  const visible = sortedVisible();
  const slice = visible.slice(0, visibleLimit);

  if (!slice.length) {
    host.innerHTML = '<div class="empty">No spots match the current filters.</div>';
    moreBtn.hidden = true;
    return;
  }

  host.innerHTML = slice.map(spot => {
    const v = getVotes(spot.id);
    return `
      <article class="spot-card">
        <div class="spot-top">
          <div>
            <div class="spot-eyebrow">${TYPE_EMOJI[spot.type]} ${TYPE_LABEL_SHORT[spot.type]} · ${esc(spot.area)}</div>
            <div class="spot-name">${esc(spot.name)}</div>
          </div>
          <span class="spot-tree-tag">${spot.tree_count || 0} trees</span>
        </div>
        ${spot.desc ? `<div class="spot-desc">${esc(spot.desc)}</div>` : ''}
        <div class="spot-footer">
          <div class="spot-tags">
            <span class="inline-tag">${esc(STAGE_LABEL[spot.stage] || 'Unknown')} bloom</span>
            <span class="inline-tag">${esc(confidence(v).label)}</span>
          </div>
          <button class="btn btn-secondary btn-sm" type="button" data-show-spot="${spot.id}">Show on map</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:8px">
          <span style="font-size:12px;color:var(--muted);font-weight:600">👍 ${v.up} · 👎 ${v.down}</span>
          <div style="display:flex;gap:6px">
            <button class="vote-btn${v.userVote === 1 ? ' active-up' : ''}" data-vote="1" data-spot-id="${spot.id}" style="padding:6px 10px;font-size:12px">👍</button>
            <button class="vote-btn${v.userVote === -1 ? ' active-down' : ''}" data-vote="-1" data-spot-id="${spot.id}" style="padding:6px 10px;font-size:12px">👎</button>
          </div>
        </div>
      </article>`;
  }).join('');

  host.querySelectorAll('[data-show-spot]').forEach(btn =>
    btn.addEventListener('click', () => selectSpot(btn.dataset.showSpot, true))
  );
  bindVoteButtons(host);
  moreBtn.hidden = visible.length <= visibleLimit;
}

function bindVoteButtons(root) {
  root.querySelectorAll('.vote-btn').forEach(btn => btn.addEventListener('click', onVoteClick));
}

function selectSpot(id, scrollToMap = false) {
  selectedSpotId = id;
  renderDrawer();
  renderBestPicks();

  const marker = markerBySpotId.get(String(id));
  if (marker) {
    leafletMap.setView(marker.getLatLng(), Math.max(leafletMap.getZoom(), 14), { animate: true });
    marker.openPopup();
  }

  if (scrollToMap) {
    document.getElementById('mapSection').scrollIntoView({ behavior:'smooth', block:'start' });
  }
}

function refreshUI() {
  invalidateCache();
  const visible = sortedVisible();
  if (!visible.some(s => String(s.id) === String(selectedSpotId))) {
    selectedSpotId = visible[0]?.id ?? null;
  }
  updateStats();
  renderMap();
  renderDrawer();
  renderBestPicks();
  renderTypeGuide();
  renderSpotGrid();
}

async function loadVoteSummary() {
  const { data, error } = await supabaseClient.from('spot_votes').select('spot_id, vote');
  if (error) {
    console.error('loadVoteSummary error', error);
    return;
  }

  const summary = new Map();
  for (const row of data || []) {
    const id = String(row.spot_id);
    const e = summary.get(id) || { up:0, down:0, total:0, userVote:0 };
    if (Number(row.vote) === 1) e.up++;
    if (Number(row.vote) === -1) e.down++;
    e.total = e.up + e.down;
    summary.set(id, e);
  }

  for (const [id, vote] of userVotes.entries()) {
    const e = summary.get(id) || { up:0, down:0, total:0, userVote:0 };
    e.userVote = vote;
    summary.set(id, e);
  }

  voteSummary = summary;
}

async function loadUserVotes() {
  const { data, error } = await supabaseClient
    .from('spot_votes')
    .select('spot_id, vote')
    .eq('voter_key', voterKey());

  if (error) {
    console.error('loadUserVotes error', error);
    return;
  }

  userVotes = new Map((data || []).map(r => [String(r.spot_id), Number(r.vote)]));
}

async function onVoteClick(ev) {
  const btn = ev.currentTarget;
  const spotId = btn.dataset.spotId;
  const vote = Number(btn.dataset.vote);
  btn.disabled = true;

  try {
    const { error } = await supabaseClient.rpc('cast_vote', {
      p_spot_id: spotId,
      p_voter_key: voterKey(),
      p_vote: vote
    });

    if (error) throw error;

    await Promise.all([loadUserVotes(), loadVoteSummary()]);
    refreshUI();
  } catch (err) {
    console.error(err);
    showToast('Vote could not be saved.');
  } finally {
    btn.disabled = false;
  }
}

async function wireRealtime() {
  if (liveChannel) {
    await supabaseClient.removeChannel(liveChannel);
    liveChannel = null;
  }

  liveChannel = supabaseClient
    .channel('spot-votes-live')
    .on('postgres_changes', { event:'*', schema:'public', table:'spot_votes' }, async () => {
      await loadVoteSummary();
      refreshUI();
    })
    .subscribe();
}

async function loadBlooms() {
  try {
    const { data, error } = await supabaseClient.from('spots').select('*');
    if (error) throw error;

    BLOOMS = normaliseBlooms(data || []);
    availableTypes = new Set(BLOOMS.map(s => s.type));
    renderChips();

    await Promise.all([loadUserVotes(), loadVoteSummary()]);

    selectedSpotId = BLOOMS[0]?.id ?? null;
    refreshUI();

    wireRealtime().catch(err => console.error('Realtime wire failed:', err));

    if (!BLOOMS.length) showToast('No bloom spots found in Supabase.');
  } catch (err) {
    console.error('Supabase load failed:', err);
    document.getElementById('resultsLine').textContent = 'Could not load bloom data.';
    document.getElementById('bestPicks').innerHTML = '<div class="empty">Bloom data did not load.</div>';
    document.getElementById('spotGrid').innerHTML = '<div class="empty">Bloom data did not load.</div>';
    showToast('Could not load bloom spots from Supabase.');
  }
}

// Debug helper — run window.debugBlooms() in the console to inspect raw data
window.debugBlooms = async function () {
  const [spots, votes] = await Promise.all([
    supabaseClient.from('spots').select('*').limit(5),
    supabaseClient.from('spot_votes').select('*').limit(5)
  ]);
  console.log('spots sample:', spots.data);
  console.log('votes sample:', votes.data);
  if (spots.data && spots.data.length) {
    console.log('column names:', Object.keys(spots.data[0]));
  }
};

document.getElementById('searchInput').addEventListener('input', e => {
  searchText = e.target.value;
  visibleLimit = PAGE_SIZE;
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(refreshUI, 200);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  activeType = 'all';
  searchText = '';
  visibleLimit = PAGE_SIZE;
  document.getElementById('searchInput').value = '';
  renderChips();
  refreshUI();
});

document.getElementById('filterRow').addEventListener('click', e => {
  const btn = e.target.closest('.chip[data-type]');
  if (!btn || btn.disabled || btn.id === 'resetBtn') return;
  activeType = btn.dataset.type;
  visibleLimit = PAGE_SIZE;
  renderChips();
  refreshUI();
});

document.getElementById('loadMoreBtn').addEventListener('click', () => {
  visibleLimit += PAGE_SIZE;
  renderSpotGrid();
});

loadBlooms();
  </script>
</body>
</html>
