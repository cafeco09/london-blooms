<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>London Blooms</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family: sans-serif; }
    #map { height:100vh; width:100%; }
    .panel {
      position:absolute;
      top:10px;
      left:10px;
      background:white;
      padding:12px;
      border-radius:8px;
      z-index:1000;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div class="panel">
  <strong>London Blooms 🌸</strong><br><br>

  <select id="month">
    <option value="all">All</option>
    <option value="March">March</option>
    <option value="April">April</option>
    <option value="May">May</option>
  </select>

  <input id="search" placeholder="Search..." style="margin-top:8px; width:100%"/>
</div>

<div id="map"></div>

<script>
const supabase = window.supabase.createClient(
  "https://esfjzhgzfbcrrewjvoan.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZmp6aGd6ZmJjcnJld2p2b2FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjg3NjIsImV4cCI6MjA4OTk0NDc2Mn0.kJOMlq3vHwYWwogSIyLccveHecA5D7WX2RwLzMqe8bY"
);

const map = L.map('map').setView([51.5074, -0.1278], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = L.layerGroup().addTo(map);

async function loadData() {
  const month = document.getElementById("month").value;
  const search = document.getElementById("search").value;

  let query = supabase
    .from("spring_trees")
    .select("lat, lon, common_name, borough, bloom_period")
    .limit(1000);

  if (month !== "all") {
    if (month === "March") {
      query = query.in("bloom_period", ["March", "March-April"]);
    }
    if (month === "April") {
      query = query.in("bloom_period", ["April", "March-April", "April-May"]);
    }
    if (month === "May") {
      query = query.in("bloom_period", ["May", "April-May"]);
    }
  }

  if (search) {
    query = query.or(
      `common_name.ilike.%${search}%,borough.ilike.%${search}%`
    );
  }

  const { data, error } = await query;

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  markers.clearLayers();

  data.forEach(tree => {
    if (!tree.lat || !tree.lon) return;

    L.marker([tree.lat, tree.lon])
      .bindPopup(
        `<b>${tree.common_name}</b><br>
         ${tree.borough}<br>
         ${tree.bloom_period}`
      )
      .addTo(markers);
  });
}

document.getElementById("month").addEventListener("change", loadData);
document.getElementById("search").addEventListener("input", () => {
  setTimeout(loadData, 300);
});

loadData();
</script>

</body>
</html>
