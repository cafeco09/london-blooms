<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>London Blooms 🌸</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blush: #f2c4ce;
      --rose: #c95c76;
      --deep-rose: #8f3550;
      --petal: #fff5f7;
      --bark: #3a2a2e;
      --soil: #5a4048;
      --sage: #6a9e72;
      --cream: #ffffff;
      --border: #f0dde3;
      --shadow: rgba(180,100,120,0.10);

      --sidebar-w: 360px;
      --header-h: 58px;

      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      color: var(--bark);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #header {
      height: var(--header-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 0 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 250, 252, 0.95);
      backdrop-filter: blur(10px);
      z-index: 500;
    }

    #headerTitle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--rose);
    }

    #headerRight {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #bloomBadge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--rose);
      color: #fff;
      padding: 5px 10px;
      border-radius: 999px;
    }

    #supportBtn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 13px;
      border-radius: 999px;
      background: #ffdd00;
      color: #2b2200;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    #supportBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.14);
    }

    #main {
      flex: 1;
      min-height: 0;
      display: flex;
    }

    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, #fffafb 0%, #fff 100%);
      min-height: 0;
      overflow: hidden;
    }

    #banner {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--petal) 0%, #fce8ef 100%);
    }

    #bannerTop {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #bloomEmoji {
      font-size: 1.6rem;
      line-height: 1;
    }

    #bloomStageName {
      font-family: var(--font-display);
      font-size: 1.12rem;
      font-weight: 600;
      color: var(--rose);
      line-height: 1.1;
    }

    #bloomTemp {
      font-size: 0.75rem;
      color: #8d7a7f;
      margin-top: 2px;
    }

    #statsBar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
      background: #fff;
      flex-shrink: 0;
    }

    .statCell {
      padding: 10px 8px;
      text-align: center;
      border-right: 1px solid var(--border);
    }

    .statCell:last-child { border-right: none; }

    .statNum {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--rose);
      line-height: 1;
    }

    .statLbl {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a38f93;
      margin-top: 3px;
    }

    #filters {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: #fff;
    }

    #filters::-webkit-scrollbar { width: 6px; }
    #filters::-webkit-scrollbar-thumb { background: #ead7dd; border-radius: 999px; }

    .filterLabel {
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #af999e;
      margin-bottom: 7px;
    }

    .chipGroup {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .chip {
      font-family: var(--font-body);
      font-size: 0.74rem;
      font-weight: 500;
      padding: 5px 11px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--soil);
      cursor: pointer;
      line-height: 1.3;
      transition: 0.15s ease;
    }

    .chip:hover {
      border-color: var(--blush);
      transform: translateY(-1px);
    }

    .chip.active.month {
      background: var(--rose);
      border-color: var(--rose);
      color: white;
    }

    .chip.active.region {
      background: var(--sage);
      border-color: var(--sage);
      color: white;
    }

    .chip.active.flower {
      background: var(--petal);
      border-color: var(--rose);
      color: var(--deep-rose);
      font-weight: 700;
    }

    .flower-chip {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .inputs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .inputs input {
      width: 100%;
      font-family: var(--font-body);
      font-size: 0.8rem;
      padding: 9px 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      outline: none;
    }

    .inputs input:focus {
      border-color: var(--blush);
    }

    #resetBtn {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: white;
      color: #9e8880;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #statusBar {
      font-size: 0.76rem;
      color: #9a868a;
      padding-top: 2px;
    }

    #mapWrap {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #mapInfo {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 400;
      background: rgba(255, 251, 252, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 0.78rem;
      color: var(--soil);
      line-height: 1.45;
      box-shadow: 0 5px 18px var(--shadow);
      pointer-events: none;
    }

    #mapInfo strong {
      display: block;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--bark);
    }

    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      border: 1px solid var(--border) !important;
      box-shadow: 0 10px 32px rgba(42,31,26,0.18) !important;
    }

    .leaflet-popup-tip {
      background: #fff !important;
    }

    .popupWrap {
      min-width: 220px;
      font-family: var(--font-body);
      color: var(--soil);
      line-height: 1.5;
    }

    .popupName {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--bark);
      margin-bottom: 4px;
      line-height: 1.1;
    }

    .popupMeta {
      font-size: 0.77rem;
      margin-bottom: 8px;
    }

    .popupMeta strong {
      color: var(--bark);
    }

    .popupScore {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--rose);
      background: var(--petal);
      border: 1px solid var(--blush);
      padding: 4px 9px;
      border-radius: 999px;
      margin-bottom: 8px;
    }

    .popupVotes {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .popupVoteBtn {
      border: 1.5px solid var(--border);
      background: white;
      color: var(--soil);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .popupVoteBtn.active.up {
      background: #e8f4e8;
      border-color: #7abf88;
      color: #3a7a4a;
    }

    .popupVoteBtn.active.down {
      background: #fde8f0;
      border-color: var(--rose);
      color: var(--deep-rose);
    }

    .popupLinks {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .popupLink {
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--rose);
      text-decoration: none;
    }

    @media (max-width: 760px) {
      #main {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 46vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      #mapWrap {
        height: 54vh;
      }

      #headerRight {
        gap: 6px;
      }

      #supportBtn {
        padding: 8px 10px;
        font-size: 0.72rem;
      }

      #bloomBadge {
        display: none;
      }
    }
  </style>
</head>
<body>

<header id="header">
  <div id="headerTitle">
    <span>🌸</span>
    <span>London Blooms</span>
  </div>

  <div id="headerRight">
    <span id="bloomBadge">Loading…</span>
    <a id="supportBtn" href="https://buymeacoffee.com/anshdt" target="_blank" rel="noopener noreferrer">
      ☕ Buy me a coffee
    </a>
  </div>
</header>

<div id="main">
  <aside id="sidebar">
    <div id="banner">
      <div id="bannerTop">
        <div id="bloomEmoji">🌿</div>
        <div>
          <div id="bloomStageName">Loading…</div>
          <div id="bloomTemp">Fetching weather…</div>
        </div>
      </div>
    </div>

    <div id="statsBar">
      <div class="statCell">
        <div class="statNum" id="cTrees">—</div>
        <div class="statLbl">Visible</div>
      </div>
      <div class="statCell">
        <div class="statNum" id="cBoroughs">—</div>
        <div class="statLbl">Boroughs</div>
      </div>
      <div class="statCell">
        <div class="statNum" id="cTypes">—</div>
        <div class="statLbl">Species</div>
      </div>
    </div>

    <div id="filters">
      <div class="filterLabel">Month</div>
      <div id="monthChips" class="chipGroup">
        <button class="chip month active" data-month="all" type="button">All</button>
        <button class="chip month" data-month="March" type="button">March</button>
        <button class="chip month" data-month="April" type="button">April</button>
        <button class="chip month" data-month="May" type="button">May</button>
      </div>

      <div class="filterLabel">Area</div>
      <div id="regionChips" class="chipGroup"></div>

      <div class="filterLabel">Flower</div>
      <div id="flowerGrid" class="chipGroup"></div>

      <div class="inputs">
        <input id="nameInput" type="text" placeholder="Search flower…" autocomplete="off" />
        <input id="boroughInput" type="text" placeholder="Borough…" list="boroughList" autocomplete="off" />
        <datalist id="boroughList"></datalist>
      </div>

      <button id="resetBtn" type="button">Reset filters</button>
      <div id="statusBar">Loading…</div>
    </div>
  </aside>

  <div id="mapWrap">
    <div id="map"></div>

    <div id="mapInfo">
      <strong>Explore the map</strong>
      Click a blossom marker to view details and let the community vote.
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://esfjzhgzfbcrrewjvoan.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZmp6aGd6ZmJjcnJld2p2b2FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjg3NjIsImV4cCI6MjA4OTk0NDc2Mn0.kJOMlq3vHwYWwogSIyLccveHecA5D7WX2RwLzMqe8bY";
  const TABLE_NAME = "spring_trees";
  const WEATHER_URL = "https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&daily=temperature_2m_mean&current=temperature_2m&timezone=Europe%2FLondon&forecast_days=1&past_days=7";

  const PER_SPECIES_LIMIT = 220;

  const FLOWERS = [
    { icon:"🌸", name:"Cherry" },
    { icon:"🌸", name:"Cherry Plum" },
    { icon:"🌸", name:"Japanese Cherry" },
    { icon:"🌺", name:"Magnolia" },
    { icon:"🌼", name:"Crab Apple" },
    { icon:"🌿", name:"Hawthorn" },
    { icon:"🌿", name:"Midland Hawthorn" },
    { icon:"🍐", name:"Pear" },
    { icon:"🍎", name:"Apple" },
    { icon:"🟣", name:"Plum" },
    { icon:"🌸", name:"Almond" },
    { icon:"🌼", name:"Blackthorn" },
    { icon:"🌳", name:"Rowan" }
  ];

  const TARGET_SPECIES = FLOWERS.map(f => f.name);

  const REGIONS = ["Central", "North", "South", "East", "West", "Other"];

  const SPECIES_COLORS = {
    cherry:             { fill:"#f4a7b9", stroke:"#bd5d79" },
    "japanese cherry":  { fill:"#f7a8c5", stroke:"#b8547b" },
    "cherry plum":      { fill:"#f2a4c0", stroke:"#b85b83" },
    magnolia:           { fill:"#d6b3ff", stroke:"#8457b8" },
    "crab apple":       { fill:"#ffd36e", stroke:"#b9851e" },
    hawthorn:           { fill:"#7abf88", stroke:"#3f7a4c" },
    "midland hawthorn": { fill:"#82c991", stroke:"#467f53" },
    pear:               { fill:"#b5d96a", stroke:"#6b8d1e" },
    apple:              { fill:"#f28b82", stroke:"#b6413c" },
    plum:               { fill:"#b08ad8", stroke:"#6d49a8" },
    almond:             { fill:"#f6c7d5", stroke:"#c96f8d" },
    blackthorn:         { fill:"#d8ecff", stroke:"#6e98c5" },
    rowan:              { fill:"#ff9d5c", stroke:"#b85a1e" },
    default:            { fill:"#d4607a", stroke:"#8f3550" }
  };

  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const state = {
    allTrees: [],
    visibleTrees: [],
    selectedId: null,
    filters: { month: "all", name: "", borough: "", region: "" },
    markersById: new Map(),
    votesBySpot: new Map(),
    myVotesBySpot: new Map(),
    hasInitialFit: false,
    filterDebounce: null
  };

  let map, markerLayer, LONDON_BOUNDS;

  const nameInput = document.getElementById("nameInput");
  const boroughInput = document.getElementById("boroughInput");
  const boroughListEl = document.getElementById("boroughList");
  const flowerGridEl = document.getElementById("flowerGrid");
  const regionChipsEl = document.getElementById("regionChips");
  const statusEl = document.getElementById("statusBar");
  const cTreesEl = document.getElementById("cTrees");
  const cBoroughsEl = document.getElementById("cBoroughs");
  const cTypesEl = document.getElementById("cTypes");
  const bloomEmojiEl = document.getElementById("bloomEmoji");
  const bloomStageNameEl = document.getElementById("bloomStageName");
  const bloomTempEl = document.getElementById("bloomTemp");
  const bloomBadgeEl = document.getElementById("bloomBadge");

  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function getVoterKey() {
    let k = localStorage.getItem("lb_voter_key");
    if (!k) {
      k = crypto.randomUUID();
      localStorage.setItem("lb_voter_key", k);
    }
    return k;
  }

  function mapsUrl(lat, lon) {
    return `https://www.google.com/maps?q=${encodeURIComponent(lat)},${encodeURIComponent(lon)}`;
  }

  function parseMonths(period) {
    if (!period) return [];
    if (period === "March-April") return ["March", "April"];
    if (period === "April-May") return ["April", "May"];
    return [period];
  }

  function regionFromBorough(borough) {
    const b = String(borough || "").trim().toLowerCase();

    const MAP = {
      Central: ["camden","city of london","city","islington","kensington and chelsea","westminster","lambeth","southwark"],
      North:   ["barnet","enfield","haringey","harrow","brent"],
      South:   ["bromley","croydon","greenwich","kingston upon thames","merton","richmond upon thames","sutton","wandsworth","lewisham","bexley"],
      East:    ["barking and dagenham","hackney","havering","newham","redbridge","tower hamlets","waltham forest"],
      West:    ["ealing","hammersmith and fulham","hillingdon","hounslow"]
    };

    for (const [region, boroughs] of Object.entries(MAP)) {
      if (boroughs.includes(b)) return region;
    }
    return "Other";
  }

  function normaliseRow(row) {
    return {
      id: String(row.id ?? crypto.randomUUID()),
      common_name: row.common_name ?? "Unknown",
      borough: row.borough ?? "",
      region: regionFromBorough(row.borough),
      location: row.location ?? "",
      lat: Number.isFinite(+row.lat) ? +row.lat : null,
      lon: Number.isFinite(+row.lon) ? +row.lon : null,
      bloom_period: row.bloom_period ?? "",
      months: parseMonths(row.bloom_period)
    };
  }

  function speciesKey(name) {
    const n = String(name || "").trim().toLowerCase();
    return Object.keys(SPECIES_COLORS).find(k => k !== "default" && n.includes(k)) || "default";
  }

  function markerStyle(tree, isSelected = false) {
    const c = SPECIES_COLORS[speciesKey(tree.common_name)] || SPECIES_COLORS.default;
    return {
      radius: isSelected ? 10 : 7,
      weight: isSelected ? 3 : 1.8,
      color: isSelected ? "#fff" : c.stroke,
      fillColor: c.fill,
      fillOpacity: isSelected ? 1 : 0.92
    };
  }

  function getVoteTotals(id) {
    return state.votesBySpot.get(String(id)) || { upvotes: 0, downvotes: 0, score: 0 };
  }

  function getMyVote(id) {
    return state.myVotesBySpot.get(String(id)) || 0;
  }

  function buildFlowerGrid() {
    flowerGridEl.innerHTML = FLOWERS.map(f => `
      <button
        class="chip flower ${state.filters.name.toLowerCase() === f.name.toLowerCase() ? "active" : ""}"
        data-name="${esc(f.name)}"
        type="button"
      >
        <span class="flower-chip">${f.icon} ${esc(f.name)}</span>
      </button>
    `).join("");

    flowerGridEl.querySelectorAll(".chip").forEach(btn => {
      btn.addEventListener("click", () => {
        const name = btn.dataset.name;
        const off = state.filters.name.toLowerCase() === name.toLowerCase();
        state.filters.name = off ? "" : name;
        nameInput.value = off ? "" : name;
        buildFlowerGrid();
        applyFilters();
      });
    });
  }

  function buildRegionChips() {
    regionChipsEl.innerHTML = REGIONS.map(region => `
      <button
        class="chip region ${state.filters.region === region ? "active" : ""}"
        data-region="${region}"
        type="button"
      >
        ${region}
      </button>
    `).join("");

    regionChipsEl.querySelectorAll(".chip").forEach(btn => {
      btn.addEventListener("click", () => {
        const region = btn.dataset.region;
        state.filters.region = state.filters.region === region ? "" : region;
        buildRegionChips();
        applyFilters();
      });
    });
  }

  function populateBoroughList() {
    const boroughs = [...new Set(
      state.allTrees.map(t => (t.borough || "").trim()).filter(Boolean)
    )].sort((a, b) => a.localeCompare(b));

    boroughListEl.innerHTML = boroughs.map(b => `<option value="${esc(b)}"></option>`).join("");
  }

  async function fetchWeather() {
    try {
      const r = await fetch(WEATHER_URL);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();

      const means = d.daily?.temperature_2m_mean ?? [];
      const avg = means.length ? means.reduce((a, b) => a + b, 0) / means.length : null;
      const current = d.current?.temperature_2m ?? null;

      let label = "Seasonal Signal";
      let emoji = "🌿";

      if (avg !== null) {
        if (avg < 8) {
          label = "Early Bud";
          emoji = "🌱";
        } else if (avg < 12) {
          label = "Bud Burst";
          emoji = "🌱";
        } else if (avg < 17) {
          label = "Peak Blossom";
          emoji = "🌸";
        } else {
          label = "Fading";
          emoji = "🍃";
        }
      }

      bloomEmojiEl.textContent = emoji;
      bloomStageNameEl.textContent = label;
      bloomTempEl.textContent = avg !== null
        ? `7-day avg ${avg.toFixed(1)} °C${current !== null ? ` · Now ${current.toFixed(0)} °C` : ""}`
        : "Temperature unavailable";
      bloomBadgeEl.textContent = label;
    } catch (error) {
      bloomEmojiEl.textContent = "🌿";
      bloomStageNameEl.textContent = "Unavailable";
      bloomTempEl.textContent = "Weather unavailable";
      bloomBadgeEl.textContent = "?";
      console.warn("Weather fetch failed:", error);
    }
  }

  async function fetchTrees() {
    statusEl.textContent = "Loading blossoms…";
    const combined = [];

    for (const species of TARGET_SPECIES) {
      const { data, error } = await db
        .from(TABLE_NAME)
        .select("id, borough, lat, lon, common_name, location, bloom_period")
        .eq("common_name", species)
        .not("lat", "is", null)
        .not("lon", "is", null)
        .limit(PER_SPECIES_LIMIT);

      if (error) {
        statusEl.textContent = `Couldn't load trees: ${error.message || "unknown error"}`;
        console.error(`fetchTrees error for ${species}:`, error);
        return;
      }

      combined.push(...(data || []));
    }

    state.allTrees = combined.map(normaliseRow);
    populateBoroughList();
    applyFilters();
  }

  async function fetchVoteTotals() {
    const { data, error } = await db.from("spot_vote_totals").select("*");
    if (error) {
      console.warn("fetchVoteTotals:", error);
      return;
    }

    state.votesBySpot = new Map(
      (data || []).map(r => [
        String(r.spot_id),
        {
          upvotes: Number(r.upvotes || 0),
          downvotes: Number(r.downvotes || 0),
          score: Number(r.score || 0)
        }
      ])
    );
  }

  async function fetchMyVotes() {
    const { data, error } = await db
      .from("spot_votes")
      .select("spot_id, vote")
      .eq("voter_key", getVoterKey());

    if (error) {
      console.warn("fetchMyVotes:", error);
      return;
    }

    state.myVotesBySpot = new Map(
      (data || []).map(r => [String(r.spot_id), Number(r.vote)])
    );
  }

  async function castVote(spotId, vote) {
    const prev = getVoteTotals(spotId);
    const prevMine = getMyVote(spotId);
    const newMine = vote === prevMine ? 0 : vote;
    const delta = newMine - prevMine;

    state.myVotesBySpot.set(String(spotId), newMine);
    state.votesBySpot.set(String(spotId), {
      upvotes: Math.max(0, prev.upvotes + (newMine === 1 ? 1 : 0) - (prevMine === 1 ? 1 : 0)),
      downvotes: Math.max(0, prev.downvotes + (newMine === -1 ? 1 : 0) - (prevMine === -1 ? 1 : 0)),
      score: prev.score + delta
    });

    refreshPopupIfSelected(spotId);

    const { error } = await db.rpc("cast_vote", {
      p_spot_id: String(spotId),
      p_voter_key: getVoterKey(),
      p_vote: vote
    });

    if (error) {
      state.myVotesBySpot.set(String(spotId), prevMine);
      state.votesBySpot.set(String(spotId), prev);
      refreshPopupIfSelected(spotId);
      alert(`Couldn't save vote: ${error.message || "unknown error"}`);
      return;
    }

    await fetchVoteTotals();
    await fetchMyVotes();
    refreshPopupIfSelected(spotId);
  }

  function applyFilters() {
    state.visibleTrees = state.allTrees.filter(t =>
      (state.filters.month === "all" || t.months.includes(state.filters.month)) &&
      (!state.filters.name || t.common_name.toLowerCase().includes(state.filters.name.toLowerCase())) &&
      (!state.filters.borough || t.borough.toLowerCase().includes(state.filters.borough.toLowerCase())) &&
      (!state.filters.region || t.region.toLowerCase() === state.filters.region.toLowerCase())
    );

    renderStats();
    renderStatus();
    renderMarkers();
  }

  function renderStats() {
    cTreesEl.textContent = state.visibleTrees.length.toLocaleString();
    cBoroughsEl.textContent = new Set(state.visibleTrees.map(t => t.borough).filter(Boolean)).size;
    cTypesEl.textContent = new Set(state.visibleTrees.map(t => t.common_name).filter(Boolean)).size;
  }

  function renderStatus() {
    if (!state.allTrees.length) {
      statusEl.textContent = "No blossom data loaded yet.";
      return;
    }

    if (!state.visibleTrees.length) {
      statusEl.textContent = "No blossom markers match these filters.";
      return;
    }

    statusEl.textContent = `${state.visibleTrees.length.toLocaleString()} blossom spots on the map`;
  }

  function popupHtml(t) {
    const votes = getVoteTotals(t.id);
    const mine = getMyVote(t.id);

    return `
      <div class="popupWrap" data-popup-id="${esc(t.id)}">
        <div class="popupName">${esc(t.common_name)}</div>

        <div class="popupMeta">
          ${t.region ? `<div><strong>Area:</strong> ${esc(t.region)}</div>` : ""}
          ${t.borough ? `<div><strong>Borough:</strong> ${esc(t.borough)}</div>` : ""}
          ${t.location ? `<div><strong>Place:</strong> ${esc(t.location)}</div>` : ""}
          ${t.bloom_period ? `<div><strong>Bloom:</strong> ${esc(t.bloom_period)}</div>` : ""}
        </div>

        <div class="popupScore">Community score ${votes.score >= 0 ? "+" : ""}${votes.score}</div>

        <div class="popupVotes">
          <button
            class="popupVoteBtn ${mine === 1 ? "active up" : ""}"
            data-spot="${esc(t.id)}"
            data-vote="1"
            type="button"
          >👍 <span>${votes.upvotes}</span></button>

          <button
            class="popupVoteBtn ${mine === -1 ? "active down" : ""}"
            data-spot="${esc(t.id)}"
            data-vote="-1"
            type="button"
          >👎 <span>${votes.downvotes}</span></button>
        </div>

        <div class="popupLinks">
          <a class="popupLink" href="${mapsUrl(t.lat, t.lon)}" target="_blank" rel="noopener noreferrer">Open in Maps ↗</a>
        </div>
      </div>
    `;
  }

  function renderMarkers() {
    const valid = state.visibleTrees.filter(t => Number.isFinite(t.lat) && Number.isFinite(t.lon));
    const newIds = new Set(valid.map(t => String(t.id)));

    for (const id of state.markersById.keys()) {
      if (!newIds.has(id)) {
        markerLayer.removeLayer(state.markersById.get(id));
        state.markersById.delete(id);
      }
    }

    const bounds = [];

    valid.forEach(t => {
      const id = String(t.id);
      const isSelected = id === String(state.selectedId);

      if (state.markersById.has(id)) {
        const marker = state.markersById.get(id);
        marker.setStyle(markerStyle(t, isSelected));
        marker.setPopupContent(popupHtml(t));
      } else {
        const marker = L.circleMarker([t.lat, t.lon], markerStyle(t, isSelected)).bindPopup(popupHtml(t));
        marker.on("click", () => selectTree(t.id, false));
        markerLayer.addLayer(marker);
        state.markersById.set(id, marker);
      }

      bounds.push([t.lat, t.lon]);
    });

    if (bounds.length && !state.hasInitialFit) {
      map.fitBounds(bounds, { padding: [28, 28] });
      state.hasInitialFit = true;
    }
  }

  function refreshPopupIfSelected(spotId) {
    const marker = state.markersById.get(String(spotId));
    const tree = state.allTrees.find(t => String(t.id) === String(spotId));
    if (!marker || !tree) return;

    marker.setPopupContent(popupHtml(tree));

    if (state.selectedId && String(state.selectedId) === String(spotId) && marker.isPopupOpen()) {
      marker.openPopup();
    }
  }

  function selectTree(id, flyTo = true) {
    const tree = state.allTrees.find(t => String(t.id) === String(id));
    if (!tree) return;

    const prevId = state.selectedId;
    state.selectedId = tree.id;

    if (prevId !== null && state.markersById.has(String(prevId))) {
      const prevTree = state.allTrees.find(t => String(t.id) === String(prevId));
      if (prevTree) {
        state.markersById.get(String(prevId)).setStyle(markerStyle(prevTree, false));
      }
    }

    const marker = state.markersById.get(String(tree.id));
    if (marker) {
      marker.setStyle(markerStyle(tree, true));
    }

    if (flyTo && Number.isFinite(tree.lat) && Number.isFinite(tree.lon)) {
      map.flyTo([tree.lat, tree.lon], Math.max(map.getZoom(), 15), { duration: 0.7 });
      map.once("moveend", () => marker?.openPopup());
    } else {
      marker?.openPopup();
    }
  }

  function resetFilters() {
    state.filters = { month: "all", name: "", borough: "", region: "" };
    state.selectedId = null;

    nameInput.value = "";
    boroughInput.value = "";

    document.querySelectorAll("#monthChips .chip").forEach(btn => btn.classList.remove("active"));
    document.querySelector('#monthChips .chip[data-month="all"]')?.classList.add("active");

    buildFlowerGrid();
    buildRegionChips();
    applyFilters();

    if (LONDON_BOUNDS) {
      map.fitBounds(LONDON_BOUNDS, { padding: [24, 24] });
    }
  }

  function initMap() {
    LONDON_BOUNDS = L.latLngBounds([51.28, -0.52], [51.70, 0.33]);

    map = L.map("map", {
      zoomControl: true,
      preferCanvas: true,
      maxBounds: LONDON_BOUNDS,
      maxBoundsViscosity: 1.0,
      minZoom: 10,
      maxZoom: 18
    });

    map.fitBounds(LONDON_BOUNDS);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    markerLayer = L.layerGroup().addTo(map);

    map.on("popupclose", () => {
      if (state.selectedId !== null) {
        const tree = state.allTrees.find(t => String(t.id) === String(state.selectedId));
        if (tree) {
          state.markersById.get(String(tree.id))?.setStyle(markerStyle(tree, false));
        }
        state.selectedId = null;
      }
    });
  }

  function wirePopupVoteDelegation() {
    document.addEventListener("click", async (e) => {
      const btn = e.target.closest(".popupVoteBtn");
      if (!btn) return;
      e.preventDefault();

      const spotId = btn.dataset.spot;
      const vote = Number(btn.dataset.vote);
      if (!spotId || !vote) return;

      await castVote(spotId, vote);
    });
  }

  window.addEventListener("load", async () => {
    initMap();
    wirePopupVoteDelegation();
    buildFlowerGrid();
    buildRegionChips();

    document.querySelectorAll("#monthChips .chip").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#monthChips .chip").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        state.filters.month = btn.dataset.month;
        applyFilters();
      });
    });

    nameInput.addEventListener("input", () => {
      state.filters.name = nameInput.value.trim();
      buildFlowerGrid();
      clearTimeout(state.filterDebounce);
      state.filterDebounce = setTimeout(applyFilters, 180);
    });

    boroughInput.addEventListener("input", () => {
      state.filters.borough = boroughInput.value.trim();
      clearTimeout(state.filterDebounce);
      state.filterDebounce = setTimeout(applyFilters, 180);
    });

    document.getElementById("resetBtn").addEventListener("click", resetFilters);

    await fetchWeather();
    await fetchTrees();
    await fetchVoteTotals();
    await fetchMyVotes();
    renderMarkers();
  });
</script>
</body>
</html>
